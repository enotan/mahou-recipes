name = "recutils"
version = "1.9"
description = "Tools and libraries to access human-editable record databases"
source = "https://ftp.gnu.org/gnu/recutils/recutils-1.9.tar.gz"
sha256 = "6301592b0020c14b456757ef5d434d49f6027b8e5f3a499d13362f205c486e0e"
source_dir = "recutils-1.9"
deps = ["readline"]

build_steps = [
  "./configure --prefix=/usr --disable-static --disable-encryption --disable-bash-builtins --with-libreadline-prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/recutils/"
version_pattern = "recutils-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/recutils/recutils-{version}.tar.gz"
source_dir_template = "recutils-{version}"
