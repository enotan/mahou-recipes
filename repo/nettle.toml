name = "nettle"
version = "3.10.2"
description = "Low-level cryptographic library"
source = "https://ftpmirror.gnu.org/nettle/nettle-3.10.2.tar.gz"
sha256 = "fe9ff51cb1f2abb5e65a6b8c10a92da0ab5ab6eaf26e7fc2b675c45f1fb519b5"
source_dir = "nettle-3.10.2"
deps = ["gmp"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/nettle/"
version_pattern = "nettle-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftpmirror.gnu.org/nettle/nettle-{version}.tar.gz"
source_dir_template = "nettle-{version}"
