name = "rsync"
version = "3.4.2"
description = "Fast incremental file transfer utility"
source = "https://download.samba.org/pub/rsync/src/rsync-3.4.2.tar.gz"
sha256 = "ff10aa2c151cd4b2dbbe6135126dbc854046113d2dfb49572a348233267eb315"
source_dir = "rsync-3.4.2"
deps = ["openssl", "zlib", "xxhash", "lz4", "zstd"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://download.samba.org/pub/rsync/src/"
version_pattern = "rsync-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://download.samba.org/pub/rsync/src/rsync-{version}.tar.gz"
source_dir_template = "rsync-{version}"
