name = "opendoas"
version = "6.8.2"
description = "Portable version of the OpenBSD doas command"
source = "https://github.com/Duncaen/OpenDoas/archive/refs/tags/v6.8.2.tar.gz"
sha256 = "6da058a0e70b7543bc60624389b0b00b686189ec933828c522bf8b2600495a67"
source_dir = "OpenDoas-6.8.2"
deps = ["bison"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.pam]
deps = ["pam"]
build_flags = ["--with-pam"]
disabled_build_flags = ["--without-pam"]

[update]
check_url = "https://github.com/Duncaen/OpenDoas/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/Duncaen/OpenDoas/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "OpenDoas-{version}"
