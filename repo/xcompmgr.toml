name = "xcompmgr"
version = "1.1.10"
description = "X11 sample compositing manager"
source = "https://www.x.org/releases/individual/app/xcompmgr-1.1.10.tar.xz"
sha256 = "7824f709c4f22432eaea7542ec93384e5dd48f6fcb85c12ff82d721423b0b98f"
source_dir = "xcompmgr-1.1.10"
deps = ["libX11", "libXcomposite", "libXdamage", "libXext", "libXfixes", "libXrender", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xcompmgr-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xcompmgr-{version}.tar.xz"
source_dir_template = "xcompmgr-{version}"
