name = "luv"
version = "1.52.1-0"
description = "Lua bindings for libuv"
source = "https://github.com/luvit/luv/archive/refs/tags/1.52.1-0.tar.gz"
sha256 = "e8b8774b31d24be4fcf2b021b90599ecccc8e476c61efcc59c3c10cab813a885"
source_dir = "luv-1.52.1-0"
deps = ["libuv", "luajit"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DWITH_SHARED_LIBUV=ON -DLUA_BUILD_TYPE=System -DWITH_LUA_ENGINE=LuaJIT -DBUILD_MODULE=ON -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/luvit/luv/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/luvit/luv/archive/refs/tags/{version}.tar.gz"
source_dir_template = "luv-{version}"
