name = "libisoburn"
version = "1.5.6"
description = "Frontend library and xorriso tool for libburn and libisofs"
source = "https://files.libburnia-project.org/releases/libisoburn-1.5.6.tar.gz"
sha256 = "2b80a6f73dd633a5d243facbe97a15e5c9a07644a5e1a242c219b9375a45f71b"
source_dir = "libisoburn-1.5.6"
deps = ["acl", "libburn", "libisofs", "readline", "zlib"]

build_steps = [
  "./configure --prefix=/usr --disable-static --enable-libreadline --enable-libacl --enable-zlib --disable-libjte --disable-libcdio --disable-ldconfig-at-install",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://files.libburnia-project.org/releases/"
version_pattern = "libisoburn-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://files.libburnia-project.org/releases/libisoburn-{version}.tar.gz"
source_dir_template = "libisoburn-{version}"
