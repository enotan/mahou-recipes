name = "gxmessage"
version = "3.4.3"
description = "GTK dialog message tool"
source = "https://ftp.gnu.org/gnu/gxmessage/gxmessage-3.4.3.tar.gz"
sha256 = "db4e1655fc58f31e5770a17dfca4e6c89028ad8b2c8e043febc87a0beedeef05"
source_dir = "gxmessage-3.4.3"
deps = ["gtk+"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gxmessage/"
version_pattern = "gxmessage-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/gxmessage/gxmessage-{version}.tar.gz"
source_dir_template = "gxmessage-{version}"
