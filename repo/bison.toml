name = "bison"
version = "3.8.2"
description = "General-purpose parser generator"
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/bison/"

source = "https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.xz"
sha256 = "9bba0214ccf7f1079c5d59210045227bcf619519840ebfa80cd3849cff5a5bf2"
source_dir = "bison-3.8.2"

deps = ["m4"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/bison/"
version_pattern = "bison-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/bison/bison-{version}.tar.xz"
source_dir_template = "bison-{version}"
