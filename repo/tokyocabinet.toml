name = "tokyocabinet"
version = "1.4.48"
description = "Library of routines for managing a database"
source = "https://dbmx.net/tokyocabinet/tokyocabinet-1.4.48.tar.gz"
sha256 = "a003f47c39a91e22d76bc4fe68b9b3de0f38851b160bbb1ca07a4f6441de1f90"
source_dir = "tokyocabinet-1.4.48"
deps = ["bzip2", "zlib"]

build_steps = [
  "./configure --prefix=/usr --disable-static --with-zlib=/usr --with-bzip=/usr --disable-exlzma --disable-exlzo",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://dbmx.net/tokyocabinet/"
version_pattern = "tokyocabinet-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://dbmx.net/tokyocabinet/tokyocabinet-{version}.tar.gz"
source_dir_template = "tokyocabinet-{version}"
