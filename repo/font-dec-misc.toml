name = "font-dec-misc"
version = "1.0.4"
description = "DEC miscellaneous bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-dec-misc-1.0.4.tar.xz"
sha256 = "82d968201d8ff8bec0e51dccd781bb4d4ebf17e11004944279bdc0201e161af7"
source_dir = "font-dec-misc-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-dec-misc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-dec-misc-{version}.tar.xz"
source_dir_template = "font-dec-misc-{version}"
