name = "bvi"
version = "1.5.0"
description = "Binary file editor based on vi"
source = "https://downloads.sourceforge.net/project/bvi/bvi/1.5.0/bvi-1.5.0.src.tar.gz"
sha256 = "6540716a1a3b2b9711635108da14b26baea488881d4a682121c0bddbba6b74cb"
source_dir = "bvi-1.5.0"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr --with-ncurses",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://sourceforge.net/projects/bvi/files/bvi/"
version_pattern = "/bvi/([0-9]+\\.[0-9]+\\.[0-9]+)/"
source_template = "https://downloads.sourceforge.net/project/bvi/bvi/{version}/bvi-{version}.src.tar.gz"
source_dir_template = "bvi-{version}"
