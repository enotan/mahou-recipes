name = "diffutils"
version = "3.12"
description = "GNU file comparison utilities"
source = "https://ftpmirror.gnu.org/diffutils/diffutils-3.12.tar.xz"
sha256 = "7c8b7f9fc8609141fdea9cece85249d308624391ff61dedaf528fcb337727dfd"
source_dir = "diffutils-3.12"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/diffutils/"
version_pattern = "diffutils-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftpmirror.gnu.org/diffutils/diffutils-{version}.tar.xz"
source_dir_template = "diffutils-{version}"
