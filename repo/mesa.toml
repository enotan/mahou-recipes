name = "mesa"
version = "26.0.7"
description = "OpenGL-like graphic library for Linux"
source = "https://archive.mesa3d.org/mesa-26.0.7.tar.xz"
sha256 = "0c56bbcf1947e1a6a90ac09b129b0ca0cb52cc31145b94595e57c8804cf02496"
source_dir = "mesa-26.0.7"
deps = ["libdrm", "libxkbcommon", "libglvnd", "wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dgallium-drivers=radeonsi,r600,nouveau,zink,llvmpipe,softpipe -Dvulkan-drivers=amd,swrast -Dgallium-rusticl=false '-Dtools=[]'",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://archive.mesa3d.org/"
version_pattern = "mesa-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://archive.mesa3d.org/mesa-{version}.tar.xz"
source_dir_template = "mesa-{version}"
