name = "swaybg"
version = "1.2.2"
description = "A wallpaper utility for Wayland"
source = "https://github.com/swaywm/swaybg/releases/download/v1.2.2/swaybg-1.2.2.tar.gz"
sha256 = "a6652a0060a0bea3c3318d9d03b6dddac34f6aeca01b883eef9e58281f5202a1"
source_dir = "swaybg-1.2.2"
deps = ["cairo", "gdk-pixbuf", "wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/swaywm/swaybg/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/swaywm/swaybg/releases/download/v{version}/swaybg-{version}.tar.gz"
source_dir_template = "swaybg-{version}"
