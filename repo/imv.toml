name = "imv"
version = "5.0.1"
description = "Minimal image viewer designed for tiling window manager users"
source = "https://git.sr.ht/~exec64/imv/archive/v5.0.1.tar.gz"
sha256 = "8949c1df4b933b1d324e02ce49f1834a4b73dd25fa8103579e0ed105149e080e"
source_dir = "imv-v5.0.1"
deps = ["libxkbcommon", "pango", "wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://git.sr.ht/~exec64/imv/refs"
version_pattern = "imv/archive/v([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://git.sr.ht/~exec64/imv/archive/v{version}.tar.gz"
source_dir_template = "imv-v{version}"
