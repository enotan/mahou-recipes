name = "libclc"
version = "21.1.6"
description = "OpenCL C library implementation for Mesa shader compilation"
source = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.6/llvm-project-21.1.6.src.tar.xz"
sha256 = "ae67086eb04bed7ca11ab880349b5f1ab6f50e1b88cda376eaf8a845b935762b"
source_dir = "llvm-project-21.1.6.src"
deps = ["cmake", "llvm", "llvm-spirv", "ninja"]

build_steps = [
  "STAGE_ROOT=$(dirname \"${MAHOU_DESTDIR}\"); LLVM_PREFIX=\"${STAGE_ROOT}/llvm/usr\"; LLVM_SPIRV_PREFIX=\"${STAGE_ROOT}/llvm-spirv/usr\"; PATH=\"${LLVM_PREFIX}/bin:${LLVM_SPIRV_PREFIX}/bin:${PATH}\"; CMAKE_PREFIX_PATH=\"${LLVM_PREFIX}:${LLVM_SPIRV_PREFIX}:${CMAKE_PREFIX_PATH:-/usr}\"; export PATH CMAKE_PREFIX_PATH; cmake -S libclc -B build-libclc -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR=\"${LLVM_PREFIX}/lib/cmake/llvm\" -DLIBCLC_TARGETS_TO_BUILD='spirv64-mesa3d-' -DENABLE_RUNTIME_SUBNORMAL=ON",
  "ninja -C build-libclc -j1",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build-libclc install",
]
