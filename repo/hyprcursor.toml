name = "hyprcursor"
version = "0.1.13"
description = "Hyprland cursor theme format and library"
source = "https://github.com/hyprwm/hyprcursor/archive/refs/tags/v0.1.13.tar.gz"
sha256 = "82af8b2ce27242ffdd6baebaa71b3f6c8665dc25c52bfcfccc16912622896af8"
source_dir = "hyprcursor-0.1.13"
deps = ["cairo", "cmake", "hyprlang", "libzip", "pkgconf", "tomlplusplus"]

build_steps = [
  "STAGE_ROOT=$(dirname \"${MAHOU_DESTDIR}\"); CMAKE_PREFIX_PATH=\"${STAGE_ROOT}/tomlplusplus/usr:${STAGE_ROOT}/libzip/usr:${CMAKE_PREFIX_PATH:-/usr}\" PKG_CONFIG_PATH=\"${STAGE_ROOT}/tomlplusplus/usr/lib/pkgconfig:${STAGE_ROOT}/tomlplusplus/usr/lib64/pkgconfig:${STAGE_ROOT}/tomlplusplus/usr/share/pkgconfig:${STAGE_ROOT}/libzip/usr/lib/pkgconfig:${STAGE_ROOT}/libzip/usr/lib64/pkgconfig:${STAGE_ROOT}/libzip/usr/share/pkgconfig:${PKG_CONFIG_PATH:-/usr/lib/pkgconfig:/usr/lib64/pkgconfig:/usr/share/pkgconfig}\" cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/hyprwm/hyprcursor/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/hyprwm/hyprcursor/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "hyprcursor-{version}"
