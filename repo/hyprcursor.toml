name = "hyprcursor"
version = "0.1.13"
description = "Hyprland cursor theme format and library"
source = "https://github.com/hyprwm/hyprcursor/archive/refs/tags/v0.1.13.tar.gz"
sha256 = "82af8b2ce27242ffdd6baebaa71b3f6c8665dc25c52bfcfccc16912622896af8"
source_dir = "hyprcursor-0.1.13"
deps = ["cairo", "cmake", "hyprlang", "libzip", "pkgconf", "tomlplusplus"]

build_steps = [
  "STAGE_ROOT=$(dirname \"${MAHOU_DESTDIR}\"); CMAKE_PREFIX_PATH=\"${CMAKE_PREFIX_PATH:-/usr}\"; PKG_CONFIG_PATH=\"${PKG_CONFIG_PATH:-/usr/lib/pkgconfig:/usr/lib64/pkgconfig:/usr/share/pkgconfig}\"; LIBRARY_PATH=\"${LIBRARY_PATH:-/usr/lib:/usr/lib64}\"; LD_LIBRARY_PATH=\"${LD_LIBRARY_PATH:-/usr/lib:/usr/lib64}\"; TOMLPLUSPLUS_PREFIX=\"/usr\"; TOMLPLUSPLUS_DIR=\"/usr/lib64/cmake/tomlplusplus\"; for prefix in \"${STAGE_ROOT}\"/*/usr; do [ -d \"${prefix}\" ] || continue; CMAKE_PREFIX_PATH=\"${prefix}:${CMAKE_PREFIX_PATH}\"; PKG_CONFIG_PATH=\"${prefix}/lib/pkgconfig:${prefix}/lib64/pkgconfig:${prefix}/share/pkgconfig:${PKG_CONFIG_PATH}\"; LIBRARY_PATH=\"${prefix}/lib:${prefix}/lib64:${LIBRARY_PATH}\"; LD_LIBRARY_PATH=\"${prefix}/lib:${prefix}/lib64:${LD_LIBRARY_PATH}\"; PATH=\"${prefix}/bin:${prefix}/sbin:${PATH:-}\"; for candidate in \"${prefix}/lib/cmake/tomlplusplus\" \"${prefix}/lib64/cmake/tomlplusplus\"; do [ -f \"${candidate}/tomlplusplusConfig.cmake\" ] && TOMLPLUSPLUS_PREFIX=\"${prefix}\" && TOMLPLUSPLUS_DIR=\"${candidate}\" && break; done; done; mkdir -p build/mahou-pkgconfig; printf 'prefix=%s\\nincludedir=${prefix}/include\\n\\nName: tomlplusplus\\nDescription: TOML config file parser and serializer for C++\\nVersion: 3.4.0\\nLibs:\\nCflags: -I${includedir} -DTOML_HEADER_ONLY=1\\n' \"${TOMLPLUSPLUS_PREFIX}\" > build/mahou-pkgconfig/tomlplusplus.pc; PKG_CONFIG_PATH=\"$(pwd)/build/mahou-pkgconfig:${PKG_CONFIG_PATH}\"; unset PKG_CONFIG_LIBDIR PKG_CONFIG_SYSROOT_DIR; export CMAKE_PREFIX_PATH PKG_CONFIG_PATH LIBRARY_PATH LD_LIBRARY_PATH PATH; cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -Dtomlplusplus_DIR=\"${TOMLPLUSPLUS_DIR}\"",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/hyprwm/hyprcursor/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/hyprwm/hyprcursor/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "hyprcursor-{version}"
