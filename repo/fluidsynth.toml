name = "fluidsynth"
version = "2.5.4"
description = "Software synthesizer based on SoundFont 2 specifications"
source = "https://github.com/FluidSynth/fluidsynth/archive/refs/tags/v2.5.4.tar.gz"
sha256 = "72f5720328fe44e2e5c67813885f0a6b4b004d048bd2eeeb0c0064074ebff530"
source_dir = "fluidsynth-2.5.4"
deps = ["cmake", "glib", "libsndfile"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -Denable-aufile=ON -Denable-jack=OFF -Denable-libinstpatch=OFF -Denable-libsndfile=ON -Denable-openmp=OFF -Denable-sdl3=OFF -Denable-systemd=OFF {feature_flags}",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[features.alsa]
deps = ["alsa-lib"]
build_flags = ["-Denable-alsa=ON"]
disabled_build_flags = ["-Denable-alsa=OFF"]

[features.dbus]
deps = ["dbus"]
build_flags = ["-Denable-dbus=ON"]
disabled_build_flags = ["-Denable-dbus=OFF"]

[features.pipewire]
deps = ["pipewire"]
build_flags = ["-Denable-pipewire=ON"]
disabled_build_flags = ["-Denable-pipewire=OFF"]

[features.pulseaudio]
deps = ["pulseaudio"]
build_flags = ["-Denable-pulseaudio=ON"]
disabled_build_flags = ["-Denable-pulseaudio=OFF"]

[features.readline]
deps = ["readline"]
build_flags = ["-Denable-readline=ON"]
disabled_build_flags = ["-Denable-readline=OFF"]

[update]
check_url = "https://github.com/FluidSynth/fluidsynth/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/FluidSynth/fluidsynth/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "fluidsynth-{version}"
