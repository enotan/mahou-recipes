name = "wf-recorder"
version = "0.6.0"
description = "Screen recorder for wlroots-based Wayland compositors"
source = "https://github.com/ammen99/wf-recorder/archive/refs/tags/v0.6.0.tar.gz"
sha256 = "52d2c952506d63708f9a8f1aacd4d6ca176287caf3507c8ff2882fa0390cb391"
source_dir = "wf-recorder-0.6.0"
deps = ["ffmpeg", "libdrm", "mesa", "meson", "ninja", "wayland", "wayland-protocols"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.pipewire]
deps = ["pipewire"]
build_flags = ["-Dpipewire=enabled", "-Ddefault_audio_backend=pipewire"]
disabled_build_flags = ["-Dpipewire=disabled"]

[features.pulseaudio]
deps = ["pulseaudio"]
build_flags = ["-Dpulse=enabled"]
disabled_build_flags = ["-Dpulse=disabled"]

[update]
check_url = "https://github.com/ammen99/wf-recorder/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/ammen99/wf-recorder/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "wf-recorder-{version}"
