name = "mpg123"
version = "1.33.4"
description = "Fast console MPEG audio player and decoder library"
source = "https://www.mpg123.de/download/mpg123-1.33.4.tar.bz2"
sha256 = "3ae8c9ff80a97bfc0e22e89fbcd74687eca4fc1db315b12607f27f01cb5a47d9"
source_dir = "mpg123-1.33.4"
deps = ["alsa-lib", "pulseaudio"]

build_steps = [
  "./configure --prefix=/usr --with-default-audio=alsa,pulse",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.mpg123.de/download/"
version_pattern = "mpg123-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://www.mpg123.de/download/mpg123-{version}.tar.bz2"
source_dir_template = "mpg123-{version}"
