name = "ccrtp"
version = "2.1.2"
description = "GNU ccRTP realtime transport protocol library"
source = "https://ftp.gnu.org/gnu/ccrtp/ccrtp-2.1.2.tar.gz"
sha256 = "f035ca0e1b5d37b78e358f07a25b05c5cdaf2c85c4b31cf29f6be17f288a349e"
source_dir = "ccrtp-2.1.2"
deps = ["ucommon"]
build_steps = ["./configure", "make", "make DESTDIR=${MAHOU_DESTDIR} install"]

[update]
check_url = "https://ftp.gnu.org/gnu/ccrtp/"
version_pattern = "ccrtp-([^\"/]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/ccrtp/ccrtp-{version}.tar.gz"
source_dir_template = "ccrtp-{version}"
