name = "libXinerama"
version = "1.1.5"
description = "X11 Xinerama extension library"
source = "https://www.x.org/releases/individual/lib/libXinerama-1.1.5.tar.xz"
sha256 = "5094d1f0fcc1828cb1696d0d39d9e866ae32520c54d01f618f1a3c1e30c2085c"
source_dir = "libXinerama-1.1.5"
deps = ["libX11", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXinerama-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libXinerama-{version}.tar.xz"
source_dir_template = "libXinerama-{version}"
