name = "startup-notification"
version = "0.12"
description = "Application startup notification and feedback library"
source = "https://www.freedesktop.org/software/startup-notification/releases/startup-notification-0.12.tar.gz"
sha256 = "3c391f7e930c583095045cd2d10eb73a64f085c7fde9d260f2652c7cb3cfbe4a"
source_dir = "startup-notification-0.12"
deps = ["libX11", "xcb-util"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.freedesktop.org/software/startup-notification/releases/"
version_pattern = "startup-notification-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.freedesktop.org/software/startup-notification/releases/startup-notification-{version}.tar.gz"
source_dir_template = "startup-notification-{version}"
