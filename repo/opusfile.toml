name = "opusfile"
version = "0.12"
description = "Library for decoding and seeking in Opus files"
source = "https://downloads.xiph.org/releases/opus/opusfile-0.12.tar.gz"
sha256 = "118d8601c12dd6a44f52423e68ca9083cc9f2bfe72da7a8c1acb22a80ae3550b"
source_dir = "opusfile-0.12"
deps = ["libogg", "opus"]
build_steps = [
    "./configure --prefix=/usr --disable-static --disable-examples --disable-doc {feature_flags}",
    "make",
    "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.http]
deps = ["openssl"]
build_flags = ["--enable-http"]
disabled_build_flags = ["--disable-http"]

[update]
check_url = "https://downloads.xiph.org/releases/opus/"
version_pattern = "opusfile-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://downloads.xiph.org/releases/opus/opusfile-{version}.tar.gz"
source_dir_template = "opusfile-{version}"
