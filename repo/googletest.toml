name = "googletest"
version = "1.17.0"
description = "Google C++ testing and mocking framework"
source = "https://github.com/google/googletest/releases/download/v1.17.0/googletest-1.17.0.tar.gz"
sha256 = "65fab701d9829d38cb77c14acdc431d2108bfdbf8979e40eb8ae567edf10b27c"
source_dir = "googletest-1.17.0"
deps = ["cmake"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -Dgtest_build_tests=OFF -Dgtest_build_samples=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/google/googletest/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/google/googletest/releases/download/v{version}/googletest-{version}.tar.gz"
source_dir_template = "googletest-{version}"
