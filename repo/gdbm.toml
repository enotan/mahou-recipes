name = "gdbm"
version = "1.26"
description = "Standard GNU database libraries"
source = "https://ftpmirror.gnu.org/gdbm/gdbm-1.26.tar.gz"
sha256 = "6a24504a14de4a744103dcb936be976df6fbe88ccff26065e54c1c47946f4a5e"
source_dir = "gdbm-1.26"
deps = ["readline"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gdbm/"
version_pattern = "gdbm-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftpmirror.gnu.org/gdbm/gdbm-{version}.tar.gz"
source_dir_template = "gdbm-{version}"
