name = "flac"
version = "1.5.0"
description = "Free lossless audio encoder and decoder"
source = "https://github.com/xiph/flac/releases/download/1.5.0/flac-1.5.0.tar.xz"
sha256 = "f2c1c76592a82ffff8413ba3c4a1299b6c7ab06c734dee03fd88630485c2b920"
source_dir = "flac-1.5.0"
deps = ["libogg"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/xiph/flac/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/xiph/flac/releases/download/{version}/flac-{version}.tar.xz"
source_dir_template = "flac-{version}"
