name = "linux"
version = "7.0.10"
description = "Linux kernel"
source = "https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.10.tar.xz"
sha256 = "094977eb62c20e3d1939fe81a92958a1f987f339446e532fa86963b2804e32dc"
source_dir = "linux-7.0.10"
deps = ["bc", "bison", "flex", "kmod", "openssl", "perl", "rsync"]

build_steps = [
  "make mrproper",
  "test -f /boot/config-$(uname -r) || (echo 'Missing /boot/config-$(uname -r). Copy your kernel config there first.' && exit 1)",
  "cp /boot/config-$(uname -r) .config",
  "make olddefconfig",
  "make -j$(nproc)",
  "make modules_install INSTALL_MOD_PATH=${MAHOU_DESTDIR}",
  "install -Dm644 arch/x86/boot/bzImage ${MAHOU_DESTDIR}/boot/vmlinuz-{version}",
  "install -Dm644 System.map ${MAHOU_DESTDIR}/boot/System.map-{version}",
  "install -Dm644 .config ${MAHOU_DESTDIR}/boot/config-{version}",
]

[update]
check_url = "https://cdn.kernel.org/pub/linux/kernel/v7.x/"
version_pattern = "linux-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-{version}.tar.xz"
source_dir_template = "linux-{version}"
