name = "aria2"
version = "1.37.0"
description = "Lightweight multi-protocol command-line download utility"
source = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.gz"
sha256 = "8e7021c6d5e8f8240c9cc19482e0c8589540836747744724d86bf8af5a21f0e8"
source_dir = "aria2-1.37.0"
deps = ["zlib"]

build_steps = [
  "./configure --prefix=/usr --without-gnutls {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.async-dns]
deps = ["c-ares"]
build_flags = ["--with-libcares"]
disabled_build_flags = ["--without-libcares"]

[features.sftp]
deps = ["libssh2"]
build_flags = ["--with-libssh2"]
disabled_build_flags = ["--without-libssh2"]

[features.sqlite]
deps = ["sqlite"]
build_flags = ["--with-sqlite3"]
disabled_build_flags = ["--without-sqlite3"]

[features.ssl]
deps = ["openssl"]
build_flags = ["--with-openssl"]
disabled_build_flags = ["--without-openssl"]

[features.xml]
deps = ["libxml2"]
build_flags = ["--with-libxml2"]
disabled_build_flags = ["--without-libxml2"]

[update]
check_url = "https://github.com/aria2/aria2/releases"
version_pattern = "/releases/tag/release-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/aria2/aria2/releases/download/release-{version}/aria2-{version}.tar.gz"
source_dir_template = "aria2-{version}"
