name = "python-setuptools"
version = "82.0.1"
description = "Python package build backend and distutils extensions"
source = "https://files.pythonhosted.org/packages/source/s/setuptools/setuptools-82.0.1.tar.gz"
sha256 = "7d872682c5d01cfde07da7bccc7b65469d3dca203318515ada1de5eda35efbf9"
source_dir = "setuptools-82.0.1"
deps = ["python"]

build_steps = [
  "python3 -c \"import os, pathlib, shutil, sysconfig; purelib = pathlib.Path(sysconfig.get_path('purelib', vars={'base': '/usr', 'platbase': '/usr'})); dest = pathlib.Path(os.environ['MAHOU_DESTDIR']) / purelib.relative_to('/'); dest.mkdir(parents=True, exist_ok=True); [shutil.copytree(src, dest / src, dirs_exist_ok=True) for src in ('setuptools', '_distutils_hack', 'setuptools.egg-info')]\"",
  "python3 -c \"import os, pathlib, sysconfig; purelib = pathlib.Path(sysconfig.get_path('purelib', vars={'base': '/usr', 'platbase': '/usr'})); dest = pathlib.Path(os.environ['MAHOU_DESTDIR']) / purelib.relative_to('/'); (dest / 'distutils-precedence.pth').write_text(\\\"import os; var = 'SETUPTOOLS_USE_DISTUTILS'; enabled = os.environ.get(var, 'local') == 'local'; enabled and __import__('_distutils_hack').add_shim()\\n\\\")\"",
]

[update]
check_url = "https://pypi.org/pypi/setuptools/json"
version_pattern = "\"version\"\\s*:\\s*\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
source_template = "https://files.pythonhosted.org/packages/source/s/setuptools/setuptools-{version}.tar.gz"
source_dir_template = "setuptools-{version}"
