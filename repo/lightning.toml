source = "https://ftp.gnu.org/gnu/lightning/lightning-2.2.3.tar.gz"
sha256 = "c045c7a33a00affbfeb11066fa502c03992e474a62ba95977aad06dbc14c6829"
source_dir = "lightning-2.2.3"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-static",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/lightning/"
version_pattern = "lightning-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
