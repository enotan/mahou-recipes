name = "libassuan"
version = "3.0.2"
description = "IPC library used by GnuPG"
source = "https://www.gnupg.org/ftp/gcrypt/libassuan/libassuan-3.0.2.tar.bz2"
sha256 = "d2931cdad266e633510f9970e1a2f346055e351bb19f9b78912475b8074c36f6"
source_dir = "libassuan-3.0.2"
deps = ["libgpg-error"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.gnupg.org/ftp/gcrypt/libassuan/"
version_pattern = "libassuan-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://www.gnupg.org/ftp/gcrypt/libassuan/libassuan-{version}.tar.bz2"
source_dir_template = "libassuan-{version}"
