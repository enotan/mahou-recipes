name = "libde265"
version = "1.0.18"
description = "Open source implementation of the H.265 video codec"
source = "https://github.com/strukturag/libde265/archive/refs/tags/v1.0.18.tar.gz"
sha256 = "3fe36dd137ead3cb8ceb067165897c8898076537b563d53be4983ff6f35d773d"
source_dir = "libde265-1.0.18"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DENABLE_SDL=OFF -DENABLE_DECODER=ON -DENABLE_ENCODER=OFF -DENABLE_SHERLOCK265=OFF -DENABLE_INTERNAL_DEVELOPMENT_TOOLS=OFF -DWITH_FUZZERS=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/strukturag/libde265/tags"
version_pattern = "\"name\"\\s*:\\s*\"v?([0-9]+\\.[0-9]+\\.[0-9]+)\""
source_template = "https://github.com/strukturag/libde265/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "libde265-{version}"
