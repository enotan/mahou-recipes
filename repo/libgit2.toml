name = "libgit2"
version = "1.9.4"
description = "Portable C implementation of Git core methods"
source = "https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.4.tar.gz"
sha256 = "824b73bd13647800fe4b566a1008ae77fea0e3e3424edab632fcfd8c0b14ba8b"
source_dir = "libgit2-1.9.4"
deps = ["libiconv", "zlib"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF -DBUILD_EXAMPLES=OFF -DUSE_BUNDLED_ZLIB=OFF {feature_flags}",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[features.https]
deps = ["openssl"]
build_flags = ["-DUSE_HTTPS=OpenSSL"]
disabled_build_flags = ["-DUSE_HTTPS=OFF"]

[features.ssh]
deps = ["libssh2"]
build_flags = ["-DUSE_SSH=libssh2"]
disabled_build_flags = ["-DUSE_SSH=OFF"]

[update]
check_url = "https://github.com/libgit2/libgit2/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/libgit2/libgit2/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "libgit2-{version}"
