name = "lib32-libdrm"
version = "2.4.133"
description = "X.Org libdrm library (32-bit)"
source = "https://dri.freedesktop.org/libdrm/libdrm-2.4.133.tar.xz"
sha256 = "fc68f9d0ba2ea63c9432a299e14fea09fad7a8a66e8039fcd7802ca59f77b4f5"
source_dir = "libdrm-2.4.133"
deps = ["lib32-libpciaccess"]

build_steps = [
  "rm -rf build-32",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib32/pkgconfig:/usr/share/pkgconfig meson setup build-32 --prefix=/usr --libdir=lib32 --buildtype=release -Dintel=enabled -Damdgpu=disabled -Dradeon=disabled -Dnouveau=disabled -Dvmwgfx=disabled -Domap=disabled -Dexynos=disabled -Dfreedreno=disabled -Dtegra=disabled -Detnaviv=disabled -Dcairo-tests=disabled -Dinstall-test-programs=false",
  "ninja -C build-32",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build-32 install",
]

[update]
check_url = "https://dri.freedesktop.org/libdrm/"
version_pattern = "libdrm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://dri.freedesktop.org/libdrm/libdrm-{version}.tar.xz"
source_dir_template = "libdrm-{version}"
