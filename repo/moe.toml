name = "moe"
version = "1.5"
description = "Modeless text editor"
source = "https://ftp.gnu.org/gnu/moe/moe-1.5.tar.gz"
sha256 = "fa40d611fb36dd2145bbec5d35258be94247963cd6ec106395c87421007a0a43"
source_dir = "moe-1.5"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/moe/"
version_pattern = "moe-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/moe/moe-{version}.tar.gz"
source_dir_template = "moe-{version}"
