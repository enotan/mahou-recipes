name = "popt"
version = "1.19"
description = "Parse Options - Command line parser"
source = "http://ftp.rpm.org/popt/releases/popt-1.x/popt-1.19.tar.gz"
sha256 = "c25a4838fc8e4c1c8aacb8bd620edb3084a3d63bf8987fdad3ca2758c63240f9"
source_dir = "popt-1.19"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "http://ftp.rpm.org/popt/releases/popt-1.x/"
version_pattern = "popt-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "http://ftp.rpm.org/popt/releases/popt-1.x/popt-{version}.tar.gz"
source_dir_template = "popt-{version}"
