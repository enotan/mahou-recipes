  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://download.savannah.gnu.org/releases/lzip/"
version_pattern = "lzip-([0-9]+\\.[0-9]+)\\.tar\\.gz"
