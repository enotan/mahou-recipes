source = "https://download.savannah.gnu.org/releases/lzip/lzip-1.26.tar.gz"
sha256 = "641cf30961525cbe3b340cc883436c8854e9f5032f459f444de4782b621e6572"
source_dir = "lzip-1.26"
deps = []

build_steps = [
