name = "pangomm"
version = "2.56.1"
description = "C++ interface for Pango"
source = "https://download.gnome.org/sources/pangomm/2.56/pangomm-2.56.1.tar.xz"
sha256 = "539f5aa60e9bdc6b955bb448e2a62cc14562744df690258040fbb74bf885755d"
source_dir = "pangomm-2.56.1"
deps = ["cairomm", "glibmm", "pango"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.gnome.org/sources/pangomm/2.56/"
version_pattern = "pangomm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/pangomm/2.56/pangomm-{version}.tar.xz"
source_dir_template = "pangomm-{version}"
