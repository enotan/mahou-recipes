name = "pangomm"
version = "2.46.4"
description = "C++ interface for Pango"
source = "https://download.gnome.org/sources/pangomm/2.46/pangomm-2.46.4.tar.xz"
sha256 = "b92016661526424de4b9377f1512f59781f41fb16c9c0267d6133ba1cd68db22"
source_dir = "pangomm-2.46.4"
deps = ["cairomm", "glibmm", "mm-common", "pango"]

build_steps = [
  "meson setup build --prefix=/usr --libdir=lib --buildtype=release --wrap-mode=nofallback -Dmaintainer-mode=false -Dbuild-documentation=false",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.gnome.org/sources/pangomm/2.46/"
version_pattern = "pangomm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/pangomm/2.46/pangomm-{version}.tar.xz"
source_dir_template = "pangomm-{version}"
