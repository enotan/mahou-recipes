name = "libextractor"
version = "1.13"
description = "Metadata extraction library"
source = "https://ftp.gnu.org/gnu/libextractor/libextractor-1.13.tar.gz"
sha256 = "bb8f312c51d202572243f113c6b62d8210301ab30cbaee604f9837d878cdf755"
source_dir = "libextractor-1.13"
deps = ["zlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/libextractor/"
version_pattern = "libextractor-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/libextractor/libextractor-{version}.tar.gz"
source_dir_template = "libextractor-{version}"
