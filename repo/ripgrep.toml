name = "ripgrep"
version = "15.1.0"
description = "Search tool that combines the usability of ag with the raw speed of grep"
source = "https://github.com/BurntSushi/ripgrep/archive/15.1.0.tar.gz"
sha256 = "046fa01a216793b8bd2750f9d68d4ad43986eb9c0d6122600f993906012972e8"
source_dir = "ripgrep-15.1.0"
deps = []

build_steps = [
  "cargo install --path . --locked --root ${MAHOU_DESTDIR}/usr",
  "rm -f ${MAHOU_DESTDIR}/usr/.crates.toml ${MAHOU_DESTDIR}/usr/.crates2.json",
]

[update]
check_url = "https://api.github.com/repos/BurntSushi/ripgrep/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/BurntSushi/ripgrep/archive/{version}.tar.gz"
source_dir_template = "ripgrep-{version}"
