name = "setxkbmap"
version = "1.3.5"
description = "Set the keyboard using the X Keyboard Extension"
source = "https://www.x.org/releases/individual/app/setxkbmap-1.3.5.tar.xz"
sha256 = "360193cecc93f906d8383a8fb5c1f3a7eed35e6ced0e118a64ee56ae13c88cac"
source_dir = "setxkbmap-1.3.5"
deps = ["libX11", "libxkbfile", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "setxkbmap-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/setxkbmap-{version}.tar.xz"
source_dir_template = "setxkbmap-{version}"
