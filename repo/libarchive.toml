name = "libarchive"
version = "3.8.7"
description = "Multi-format archive and compression library"
source = "https://www.libarchive.de/downloads/libarchive-3.8.7.tar.xz"
sha256 = "d3a8ba457ae25c27c84fd2830a2efdcc5b1d40bf585d4eb0d35f47e99e5d4774"
source_dir = "libarchive-3.8.7"
deps = []

build_steps = [
  "./configure --prefix=/usr --without-libb2 --without-mbedtls --without-nettle {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.acl]
deps = ["acl"]
build_flags = ["--enable-acl"]
disabled_build_flags = ["--disable-acl"]

[features.bzip2]
deps = ["bzip2"]
build_flags = ["--with-bz2lib"]
disabled_build_flags = ["--without-bz2lib"]

[features.lz4]
deps = ["lz4"]
build_flags = ["--with-lz4"]
disabled_build_flags = ["--without-lz4"]

[features.lzma]
deps = ["xz"]
build_flags = ["--with-lzma"]
disabled_build_flags = ["--without-lzma"]

[features.lzo]
deps = ["lzo"]
build_flags = ["--with-lzo2"]
disabled_build_flags = ["--without-lzo2"]

[features.openssl]
deps = ["openssl"]
build_flags = ["--with-openssl"]
disabled_build_flags = ["--without-openssl"]

[features.xml]
deps = ["expat", "libxml2"]
build_flags = ["--with-expat", "--with-xml2"]
disabled_build_flags = ["--without-expat", "--without-xml2"]

[features.zlib]
deps = ["zlib"]
build_flags = ["--with-zlib"]
disabled_build_flags = ["--without-zlib"]

[features.zstd]
deps = ["zstd"]
build_flags = ["--with-zstd"]
disabled_build_flags = ["--without-zstd"]

[update]
check_url = "https://www.libarchive.de/downloads/"
version_pattern = "libarchive-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.libarchive.de/downloads/libarchive-{version}.tar.xz"
source_dir_template = "libarchive-{version}"
