name = "libopusenc"
version = "0.3"
description = "Library for encoding Ogg Opus files"
source = "https://downloads.xiph.org/releases/opus/libopusenc-0.3.tar.gz"
sha256 = "f616d3aff9b2034547894ccb8ab56c36cf1a4acb0d922c5d7119f97bbe58642c"
source_dir = "libopusenc-0.3"
deps = ["opus"]
build_steps = [
    "./configure --prefix=/usr --disable-static --disable-examples --disable-doc",
    "make",
    "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://downloads.xiph.org/releases/opus/"
version_pattern = "libopusenc-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://downloads.xiph.org/releases/opus/libopusenc-{version}.tar.gz"
source_dir_template = "libopusenc-{version}"
