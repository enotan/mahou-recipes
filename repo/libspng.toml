name = "libspng"
version = "0.7.4"
description = "Simple PNG decoding and encoding library"
source = "https://github.com/randy408/libspng/archive/refs/tags/v0.7.4.tar.gz"
sha256 = "47ec02be6c0a6323044600a9221b049f63e1953faf816903e7383d4dc4234487"
source_dir = "libspng-0.7.4"
deps = ["cmake", "zlib"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DSPNG_SHARED=ON -DSPNG_STATIC=OFF -DBUILD_EXAMPLES=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/randy408/libspng/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/randy408/libspng/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "libspng-{version}"
