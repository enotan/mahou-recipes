name = "bash"
version = "5.3"
description = "GNU Bourne Again shell"
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/bash/"

source = "https://ftp.gnu.org/gnu/bash/bash-5.3.tar.gz"
sha256 = "0d5cd86965f869a26cf64f4b71be7b96f90a3ba8b3d74e27e8e9d9d5550f31ba"
source_dir = "bash-5.3"

deps = ["readline"]

build_steps = [
  "./configure --prefix=/usr --without-bash-malloc",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/bash/"
version_pattern = "bash-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/bash/bash-{version}.tar.gz"
source_dir_template = "bash-{version}"
