name = "re2c"
version = "4.5.1"
description = "Lexer generator for C, C++, and other languages"
source = "https://github.com/skvadrik/re2c/releases/download/4.5.1/re2c-4.5.1.tar.xz"
sha256 = "ffea067c11aa668bcb42885be6e6cd000302000b7747d2bb213299ec66b7864e"
source_dir = "re2c-4.5.1"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-docs --disable-syntax --disable-lexers --disable-parsers --disable-libs --disable-benchmarks",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/skvadrik/re2c/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/skvadrik/re2c/releases/download/{version}/re2c-{version}.tar.xz"
source_dir_template = "re2c-{version}"
