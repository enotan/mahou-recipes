name = "lib32-libffi"
version = "3.5.2"
description = "Portable calling convention interface library (32-bit)"
source = "https://github.com/libffi/libffi/releases/download/v3.5.2/libffi-3.5.2.tar.gz"
sha256 = "f3a3082a23b37c293a4fcd1053147b371f2ff91fa7ea1b2a52e335676bac82dc"
source_dir = "libffi-3.5.2"
deps = []

build_steps = [
  "make distclean || true",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib/pkgconfig:/usr/share/pkgconfig ./configure --prefix=/usr --libdir=/usr/lib --host=i686-pc-linux-gnu",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/libffi/libffi/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/libffi/libffi/releases/download/v{version}/libffi-{version}.tar.gz"
source_dir_template = "libffi-{version}"
