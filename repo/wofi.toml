name = "wofi"
version = "1.4.1"
description = "Wofi is a launcher/menu program for wlroots based wayland compositors like sway"
source = "https://hg.sr.ht/~scoopta/wofi/archive/v1.4.1.tar.gz"
sha256 = "e95e35c03551c39178c16ad6213a88e3883a236e942d7f2666c780d934c270bb"
source_dir = "wofi-v1.4.1"
deps = ["gtk+", "wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://hg.sr.ht/~scoopta/wofi/tags"
version_pattern = "wofi/archive/v([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://hg.sr.ht/~scoopta/wofi/archive/v{version}.tar.gz"
source_dir_template = "wofi-v{version}"
