name = "jbig2dec"
version = "0.20"
description = "Decoder for JBIG2 monochrome image compression"
source = "https://github.com/ArtifexSoftware/jbig2dec/archive/refs/tags/0.20.tar.gz"
sha256 = "a9705369a6633aba532693450ec802c562397e1b824662de809ede92f67aff21"
source_dir = "jbig2dec-0.20"
deps = ["autoconf", "automake", "libpng", "libtool", "pkgconf"]

build_steps = [
  "./autogen.sh",
  "./configure --prefix=/usr --mandir=/usr/share/man --disable-static",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/ArtifexSoftware/jbig2dec/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/ArtifexSoftware/jbig2dec/archive/refs/tags/{version}.tar.gz"
source_dir_template = "jbig2dec-{version}"
