name = "taglib"
version = "2.3"
description = "Audio metadata library"
source = "https://github.com/taglib/taglib/releases/download/v2.3/taglib-2.3.tar.gz"
sha256 = "7349f6fd942418bc7009ebe743eb7c9d055f02921ec56fa436ec25007c47fd38"
source_dir = "taglib-2.3"
deps = ["cmake", "zlib"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF -DWITH_ZLIB=ON",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/taglib/taglib/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/taglib/taglib/releases/download/v{version}/taglib-{version}.tar.gz"
source_dir_template = "taglib-{version}"
