name = "libXScrnSaver"
version = "1.2.5"
description = "X11 Screen Saver extension client library"
source = "https://www.x.org/releases/individual/lib/libXScrnSaver-1.2.5.tar.xz"
sha256 = "5057365f847253e0e275871441e10ff7846c8322a5d88e1e187d326de1cd8d00"
source_dir = "libXScrnSaver-1.2.5"
deps = ["libX11", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXScrnSaver-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
