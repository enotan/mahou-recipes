name = "speex"
version = "1.2.1"
description = "Patent-free audio compression format designed for speech"
source = "https://downloads.xiph.org/releases/speex/speex-1.2.1.tar.gz"
sha256 = "4b44d4f2b38a370a2d98a78329fefc56a0cf93d1c1be70029217baae6628feea"
source_dir = "speex-1.2.1"
deps = ["speexdsp"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://downloads.xiph.org/releases/speex/"
version_pattern = "speex-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://downloads.xiph.org/releases/speex/speex-{version}.tar.gz"
source_dir_template = "speex-{version}"
