name = "gv"
version = "3.7.4"
description = "PostScript and PDF viewer for X11"
source = "https://ftp.gnu.org/gnu/gv/gv-3.7.4.tar.gz"
sha256 = "2162b3b3a95481d3855b3c4e28f974617eef67824523e56e20b56f12fe201a61"
source_dir = "gv-3.7.4"
deps = ["libX11", "libXaw", "libXinerama", "libXmu", "libXt", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gv/"
version_pattern = "gv-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/gv/gv-{version}.tar.gz"
source_dir_template = "gv-{version}"
