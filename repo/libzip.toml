name = "libzip"
version = "1.11.4"
description = "C library for reading, creating, and modifying zip archives"
source = "https://github.com/nih-at/libzip/releases/download/v1.11.4/libzip-1.11.4.tar.xz"
sha256 = "8a247f57d1e3e6f6d11413b12a6f28a9d388de110adc0ec608d893180ed7097b"
source_dir = "libzip-1.11.4"
deps = ["cmake", "zlib"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_REGRESS=OFF -DBUILD_OSSFUZZ=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOC=OFF -DENABLE_GNUTLS=OFF -DENABLE_MBEDTLS=OFF {feature_flags}",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[features.bzip2]
deps = ["bzip2"]
build_flags = ["-DENABLE_BZIP2=ON"]
disabled_build_flags = ["-DENABLE_BZIP2=OFF"]

[features.lzma]
deps = ["xz"]
build_flags = ["-DENABLE_LZMA=ON"]
disabled_build_flags = ["-DENABLE_LZMA=OFF"]

[features.openssl]
deps = ["openssl"]
build_flags = ["-DENABLE_OPENSSL=ON"]
disabled_build_flags = ["-DENABLE_OPENSSL=OFF"]

[features.zstd]
deps = ["zstd"]
build_flags = ["-DENABLE_ZSTD=ON"]
disabled_build_flags = ["-DENABLE_ZSTD=OFF"]

[update]
check_url = "https://github.com/nih-at/libzip/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/nih-at/libzip/releases/download/v{version}/libzip-{version}.tar.xz"
source_dir_template = "libzip-{version}"
