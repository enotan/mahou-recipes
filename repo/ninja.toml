name = "ninja"
version = "1.13.2"
description = "A small build system similar to make"
source = "https://github.com/ninja-build/ninja/archive/v1.13.2.tar.gz"
sha256 = "974d6b2f4eeefa25625d34da3cb36bdcebe7fbce40f4c16ac0835fd1c0cbae17"
source_dir = "ninja-1.13.2"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/ninja-build/ninja/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/ninja-build/ninja/archive/v{version}.tar.gz"
source_dir_template = "ninja-{version}"
