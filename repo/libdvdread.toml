name = "libdvdread"
version = "7.0.1"
description = "DVD reading library"
source = "https://download.videolan.org/pub/videolan/libdvdread/7.0.1/libdvdread-7.0.1.tar.xz"
sha256 = "2e3e04a305c15c3963aa03ae1b9a83c1d239880003fcf3dde986d3943355d407"
source_dir = "libdvdread-7.0.1"
deps = ["libdvdcss", "meson", "ninja", "pkgconf"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dlibdvdcss=enabled",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.videolan.org/pub/videolan/libdvdread/"
version_pattern = "([0-9]+\\.[0-9]+\\.[0-9]+)/"
source_template = "https://download.videolan.org/pub/videolan/libdvdread/{version}/libdvdread-{version}.tar.xz"
source_dir_template = "libdvdread-{version}"
