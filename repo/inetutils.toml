name = "inetutils"
version = "2.6"
description = "GNU network clients and servers"
source = "https://ftp.gnu.org/gnu/inetutils/inetutils-2.6.tar.xz"
sha256 = "68bedbfeaf73f7d86be2a7d99bcfbd4093d829f52770893919ae174c0b2357ca"
source_dir = "inetutils-2.6"
deps = ["ncurses", "readline"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var --disable-servers --disable-systemd --with-libreadline-prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/inetutils/"
version_pattern = "inetutils-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/inetutils/inetutils-{version}.tar.xz"
source_dir_template = "inetutils-{version}"
