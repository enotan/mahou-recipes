name = "libglvnd"
version = "1.7.0"
description = "The GL Vendor-Neutral Dispatch library"
source = "https://gitlab.freedesktop.org/glvnd/libglvnd/-/archive/v1.7.0/libglvnd-v1.7.0.tar.bz2"
sha256 = "d0e1925a3c9aee0143b8c181ac31d5637c8faa081759c277b8e16c7075612c11"
source_dir = "libglvnd-v1.7.0"
deps = ["libX11", "libXext"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://gitlab.freedesktop.org/glvnd/libglvnd/-/tags"
version_pattern = "libglvnd-v([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://gitlab.freedesktop.org/glvnd/libglvnd/-/archive/v{version}/libglvnd-v{version}.tar.bz2"
source_dir_template = "libglvnd-v{version}"
