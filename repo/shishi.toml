name = "shishi"
version = "1.0.3"
description = "GNU implementation of the Kerberos 5 network protocol"
source = "https://ftp.gnu.org/gnu/shishi/shishi-1.0.3.tar.gz"
sha256 = "95798ffd12dd01a4f88e0311ee03ca4a26e5cb4e5e9059a40e4fc4d9f2917e92"
source_dir = "shishi-1.0.3"
deps = ["gnutls", "libgcrypt", "libidn2"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/shishi/"
version_pattern = "shishi-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/shishi/shishi-{version}.tar.gz"
source_dir_template = "shishi-{version}"
