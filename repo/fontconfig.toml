name = "fontconfig"
version = "2.17.1"
description = "A library for configuring and customizing font access"
source = "https://gitlab.freedesktop.org/api/v4/projects/890/packages/generic/fontconfig/2.17.1/fontconfig-2.17.1.tar.xz"
sha256 = "9f5cae93f4fffc1fbc05ae99cdfc708cd60dfd6612ffc0512827025c026fa541"
source_dir = "fontconfig-2.17.1"
deps = ["expat", "freetype"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://gitlab.freedesktop.org/api/v4/projects/890/packages/generic/fontconfig/"
version_pattern = "fontconfig/([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://gitlab.freedesktop.org/api/v4/projects/890/packages/generic/fontconfig/{version}/fontconfig-{version}.tar.xz"
source_dir_template = "fontconfig-{version}"
