name = "libtomcrypt"
version = "1.18.2"
description = "Modular cryptographic library"
source = "https://github.com/libtom/libtomcrypt/releases/download/v1.18.2/crypt-1.18.2.tar.xz"
sha256 = "96ad4c3b8336050993c5bc2cf6c057484f2b0f9f763448151567fbab5e767b84"
source_dir = "libtomcrypt-1.18.2"
deps = ["libtommath", "libtool"]
build_steps = [
    "make -f makefile.shared PREFIX=/usr CFLAGS=\"-DUSE_LTM -DLTM_DESC\" EXTRALIBS=\"-ltommath\" libtomcrypt.la",
    "make -f makefile.shared DESTDIR=${MAHOU_DESTDIR} PREFIX=/usr CFLAGS=\"-DUSE_LTM -DLTM_DESC\" EXTRALIBS=\"-ltommath\" install",
]

[update]
check_url = "https://api.github.com/repos/libtom/libtomcrypt/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/libtom/libtomcrypt/releases/download/v{version}/crypt-{version}.tar.xz"
source_dir_template = "libtomcrypt-{version}"
