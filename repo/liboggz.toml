name = "liboggz"
version = "1.1.3"
description = "Library and tools for inspecting and editing Ogg files"
source = "https://downloads.xiph.org/releases/liboggz/liboggz-1.1.3.tar.gz"
sha256 = "2466d03b67ef0bcba0e10fb352d1a9ffd9f96911657abce3cbb6ba429c656e2f"
source_dir = "liboggz-1.1.3"
deps = ["libogg"]
build_steps = [
    "./configure --prefix=/usr --disable-static --disable-oggtest",
    "make",
    "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://downloads.xiph.org/releases/liboggz/"
version_pattern = "liboggz-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://downloads.xiph.org/releases/liboggz/liboggz-{version}.tar.gz"
source_dir_template = "liboggz-{version}"
