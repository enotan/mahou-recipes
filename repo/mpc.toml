name = "mpc"
version = "1.3.1"
description = "Multiple precision complex arithmetic library"
license = "LGPL-3.0-or-later"
homepage = "https://www.multiprecision.org/mpc/"

source = "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
sha256 = "ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8"
source_dir = "mpc-1.3.1"

deps = ["gmp", "mpfr"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/mpc/"
version_pattern = "mpc-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/mpc/mpc-{version}.tar.gz"
source_dir_template = "mpc-{version}"
