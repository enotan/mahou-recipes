name = "xlsfonts"
version = "1.0.8"
description = "List fonts available from an X11 server"
source = "https://www.x.org/releases/individual/app/xlsfonts-1.0.8.tar.xz"
sha256 = "807f909eace684b866fc63b3e962729c120822a6c96e051ff51cf350b3ffb6cd"
source_dir = "xlsfonts-1.0.8"
deps = ["libX11", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xlsfonts-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xlsfonts-{version}.tar.xz"
source_dir_template = "xlsfonts-{version}"
