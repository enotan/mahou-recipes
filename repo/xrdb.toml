name = "xrdb"
version = "1.2.2"
description = "X server resource database utility"
source = "https://www.x.org/releases/individual/app/xrdb-1.2.2.tar.xz"
sha256 = "31f5fcab231b38f255b00b066cf7ea3b496df712c9eb2d0d50c670b63e5033f4"
source_dir = "xrdb-1.2.2"
deps = ["libX11", "libXmu", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xrdb-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xrdb-{version}.tar.xz"
source_dir_template = "xrdb-{version}"
