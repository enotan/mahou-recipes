name = "libnet"
version = "1.3"
description = "Portable packet creation and injection library"
source = "https://github.com/libnet/libnet/releases/download/v1.3/libnet-1.3.tar.gz"
sha256 = "ad1e2dd9b500c58ee462acd839d0a0ea9a2b9248a1287840bc601e774fb6b28f"
source_dir = "libnet-1.3"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-doxygen-doc --disable-samples --disable-tests",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/libnet/libnet/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/libnet/libnet/releases/download/v{version}/libnet-{version}.tar.gz"
source_dir_template = "libnet-{version}"
