name = "python"
version = "3.14.5"
description = "Python programming language"
source = "https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tar.xz"
sha256 = "7e32597b99e5d9a39abed35de4693fa169df3e5850d4c334337ffd6a19a36db6"
source_dir = "Python-3.14.5"
deps = ["bzip2", "expat", "libffi", "ncurses", "openssl", "readline", "sqlite", "xz", "zlib"]

build_steps = [
  "./configure --prefix=/usr --enable-shared --with-system-expat",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.python.org/ftp/python/"
version_pattern = "([0-9]+\\.[0-9]+\\.[0-9]+)/"
source_template = "https://www.python.org/ftp/python/{version}/Python-{version}.tar.xz"
source_dir_template = "Python-{version}"
