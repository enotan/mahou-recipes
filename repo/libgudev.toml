name = "libgudev"
version = "238"
description = "GObject bindings for libudev"
source = "https://download.gnome.org/sources/libgudev/238/libgudev-238.tar.xz"
sha256 = "61266ab1afc9d73dbc60a8b2af73e99d2fdff47d99544d085760e4fa667b5dd1"
source_dir = "libgudev-238"
deps = ["eudev", "glib"]

build_steps = [
  "meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dtests=disabled -Dvapi=disabled",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.gnome.org/sources/libgudev/238/"
version_pattern = "libgudev-([0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/libgudev/{version}/libgudev-{version}.tar.xz"
source_dir_template = "libgudev-{version}"
