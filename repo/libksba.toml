name = "libksba"
version = "1.8.0"
description = "X.509 and CMS library used by GnuPG"
source = "https://www.gnupg.org/ftp/gcrypt/libksba/libksba-1.8.0.tar.bz2"
sha256 = "296b9db9095749f2aa104202d7ab7fd09ad10710e00780a709c9754b1a1d9292"
source_dir = "libksba-1.8.0"
deps = ["libgpg-error"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.gnupg.org/ftp/gcrypt/libksba/"
version_pattern = "libksba-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://www.gnupg.org/ftp/gcrypt/libksba/libksba-{version}.tar.bz2"
source_dir_template = "libksba-{version}"
