name = "rofi"
version = "2.0.0"
description = "A window switcher, run dialog and dmenu replacement"
source = "https://github.com/davatorium/rofi/releases/download/2.0.0/rofi-2.0.0.tar.xz"
sha256 = "6a55ee27f189ef9a1435cea329b146805b5dc830d8abc7a08c50a971521a8d8d"
source_dir = "rofi-2.0.0"
deps = ["cairo", "glib", "libX11", "libxcb", "pango", "startup-notification", "xcb-util", "xcb-util-wm", "xcb-util-xrm"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/davatorium/rofi/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/davatorium/rofi/releases/download/{version}/rofi-{version}.tar.xz"
source_dir_template = "rofi-{version}"
