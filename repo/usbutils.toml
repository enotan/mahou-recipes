name = "usbutils"
version = "019"
description = "Utilities for listing and inspecting USB devices"
source = "https://www.kernel.org/pub/linux/utils/usb/usbutils/usbutils-019.tar.xz"
sha256 = "659f40c440e31ba865c52c818a33d3ba6a97349e3353f8b1985179cb2aa71ec5"
source_dir = "usbutils-019"
deps = ["eudev", "libusb"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://www.kernel.org/pub/linux/utils/usb/usbutils/"
version_pattern = "usbutils-([0-9]+)\\.tar\\.xz"
source_template = "https://www.kernel.org/pub/linux/utils/usb/usbutils/usbutils-{version}.tar.xz"
source_dir_template = "usbutils-{version}"
