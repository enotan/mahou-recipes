name = "libXfontcache"
version = "1.0.5"
description = "X Font Cache extension client library"
source = "https://www.x.org/releases/individual/lib/libXfontcache-1.0.5.tar.gz"
sha256 = "fdba75307a0983d2566554e0e9effa7079551f1b7b46e8de642d067998619659"
source_dir = "libXfontcache-1.0.5"
deps = ["libX11", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXfontcache-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/lib/libXfontcache-{version}.tar.gz"
source_dir_template = "libXfontcache-{version}"
