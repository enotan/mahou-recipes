name = "texinfo"
version = "7.2"
description = "GNU documentation system"
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/texinfo/"

source = "https://ftp.gnu.org/gnu/texinfo/texinfo-7.2.tar.xz"
sha256 = "0329d7788fbef113fa82cb80889ca197a344ce0df7646fe000974c5d714363a6"
source_dir = "texinfo-7.2"

deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/texinfo/"
version_pattern = "texinfo-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/texinfo/texinfo-{version}.tar.xz"
source_dir_template = "texinfo-{version}"
