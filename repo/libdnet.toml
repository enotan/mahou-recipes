name = "libdnet"
version = "1.18.2"
description = "Portable low-level networking library"
source = "https://github.com/ofalk/libdnet/archive/refs/tags/libdnet-1.18.2.tar.gz"
sha256 = "95611c6d2703f1772fc01ce74acf4ebcc4bcd4315cede35b343bb90dc43bfd8f"
source_dir = "libdnet-libdnet-1.18.2"
deps = []

build_steps = [
  "./configure --prefix=/usr --without-python --disable-check",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/ofalk/libdnet/tags"
version_pattern = "/releases/tag/([^\"/]+)"
