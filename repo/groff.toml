name = "groff"
version = "1.23.0"
description = "GNU typesetting system that reads roff documents"
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/groff/"

source = "https://ftp.gnu.org/gnu/groff/groff-1.23.0.tar.gz"
sha256 = "6b9757f592b7518b4902eb6af7e54570bdccba37a871fddb2d30ae3863511c13"
source_dir = "groff-1.23.0"

deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/groff/"
version_pattern = "groff-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/groff/groff-{version}.tar.gz"
source_dir_template = "groff-{version}"
