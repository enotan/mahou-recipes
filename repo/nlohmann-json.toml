name = "nlohmann-json"
version = "3.12.0"
description = "JSON for Modern C++"
source = "https://github.com/nlohmann/json/archive/refs/tags/v3.12.0.tar.gz"
sha256 = "4b92eb0c06d10683f7447ce9406cb97cd4b453be18d7279320f7b2f025c10187"
source_dir = "json-3.12.0"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DJSON_BuildTests=OFF",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/nlohmann/json/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/nlohmann/json/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "json-{version}"
