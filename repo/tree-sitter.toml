name = "tree-sitter"
version = "0.26.8"
description = "Tree-sitter is a parser generator tool and an incremental parsing library"
source = "https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v0.26.8.tar.gz"
sha256 = "e6826b7533ec3a885aba598377a6d20b5a6321ff3db76968e960c2352d3a5077"
source_dir = "tree-sitter-0.26.8"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/tree-sitter/tree-sitter/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "tree-sitter-{version}"
