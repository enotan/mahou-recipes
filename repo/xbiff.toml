name = "xbiff"
version = "1.0.6"
description = "Mailbox flag utility for X"
source = "https://www.x.org/releases/individual/app/xbiff-1.0.6.tar.xz"
sha256 = "a85f34361c317ca216f42da9ee069a68b4beffd8dc0c973c9c339c8dd1d7d62a"
source_dir = "xbiff-1.0.6"
deps = ["libX11", "libXaw", "libXext", "libXmu", "libXt", "xbitmaps", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xbiff-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xbiff-{version}.tar.xz"
source_dir_template = "xbiff-{version}"
