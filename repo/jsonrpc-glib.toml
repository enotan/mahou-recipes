name = "jsonrpc-glib"
version = "3.44.2"
description = "JSON-RPC library for GLib"
source = "https://download.gnome.org/sources/jsonrpc-glib/3.44/jsonrpc-glib-3.44.2.tar.xz"
sha256 = "965496b6e1314f3468b482a5d80340dc3b0340a5402d7783cad24154aee77396"
source_dir = "jsonrpc-glib-3.44.2"
deps = ["glib", "json-glib"]
build_steps = ["meson setup build --prefix=/usr --buildtype=release", "ninja -C build", "DESTDIR=${MAHOU_DESTDIR} ninja -C build install"]

[update]
check_url = "https://download.gnome.org/sources/jsonrpc-glib/3.44/"
version_pattern = "jsonrpc-glib-([^\"/]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/jsonrpc-glib/3.44/jsonrpc-glib-{version}.tar.xz"
source_dir_template = "jsonrpc-glib-{version}"
