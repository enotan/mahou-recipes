name = "libpng"
version = "1.6.58"
description = "Portable Network Graphics library"
source = "https://downloads.sourceforge.net/project/libpng/libpng16/1.6.58/libpng-1.6.58.tar.xz"
sha256 = "28eb403f51f0f7405249132cecfe82ea5c0ef97f1b32c5a65828814ae0d34775"
source_dir = "libpng-1.6.58"
deps = ["zlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://sourceforge.net/projects/libpng/files/libpng16/"
version_pattern = "libpng-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://downloads.sourceforge.net/project/libpng/libpng16/{version}/libpng-{version}.tar.xz"
source_dir_template = "libpng-{version}"
