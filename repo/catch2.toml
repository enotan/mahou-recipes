name = "catch2"
version = "3.15.0"
description = "C++ unit testing framework"
source = "https://github.com/catchorg/Catch2/archive/refs/tags/v3.15.0.tar.gz"
sha256 = "9650c55e497759cc39b977e45524bc8acb15256061c112080916ab6cb0b1ea66"
source_dir = "Catch2-3.15.0"
deps = ["cmake"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DCATCH_INSTALL_DOCS=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/catchorg/Catch2/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/catchorg/Catch2/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "Catch2-{version}"
