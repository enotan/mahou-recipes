name = "fmt"
version = "12.1.0"
description = "Small, safe and fast formatting library"
source = "https://github.com/fmtlib/fmt/archive/12.1.0.tar.gz"
sha256 = "ea7de4299689e12b6dddd392f9896f08fb0777ac7168897a244a6d6085043fea"
source_dir = "fmt-12.1.0"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/fmtlib/fmt/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/fmtlib/fmt/archive/{version}.tar.gz"
source_dir_template = "fmt-{version}"
