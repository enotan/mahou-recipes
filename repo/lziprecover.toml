source = "https://download.savannah.gnu.org/releases/lzip/lziprecover/lziprecover-1.26.tar.gz"
sha256 = "e234005a756d5649f41686116d3e548736d4a77e5a5ec37b943ca6650787801d"
source_dir = "lziprecover-1.26"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
