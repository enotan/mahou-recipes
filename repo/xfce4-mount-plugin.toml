name = "xfce4-mount-plugin"
version = "1.2.0"
description = "Mount devices panel plugin for Xfce"
source = "https://archive.xfce.org/src/panel-plugins/xfce4-mount-plugin/1.2/xfce4-mount-plugin-1.2.0.tar.xz"
sha256 = "adef71a83078e7dc45997e57411f8c43080a0204159a8b8db2ade0a9877e7b4c"
source_dir = "xfce4-mount-plugin-1.2.0"
deps = ["glib", "gtk+", "libxfce4ui", "xfce4-panel"]
build_steps = ["meson setup build --prefix=/usr --buildtype=release", "ninja -C build", "DESTDIR=${MAHOU_DESTDIR} ninja -C build install"]

[update]
check_url = "https://archive.xfce.org/src/panel-plugins/xfce4-mount-plugin/1.2/"
version_pattern = "xfce4-mount-plugin-([^\"/]+)\\.tar\\.xz"
source_template = "https://archive.xfce.org/src/panel-plugins/xfce4-mount-plugin/1.2/xfce4-mount-plugin-{version}.tar.xz"
source_dir_template = "xfce4-mount-plugin-{version}"
