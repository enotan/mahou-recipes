name = "tiff"
version = "4.7.1"
description = "Tag Image File Format (TIFF) library"
source = "https://download.osgeo.org/libtiff/tiff-4.7.1.tar.xz"
sha256 = "b92017489bdc1db3a4c97191aa4b75366673cb746de0dce5d7a749d5954681ba"
source_dir = "tiff-4.7.1"
deps = ["zlib", "xz", "libjpeg-turbo"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://download.osgeo.org/libtiff/"
version_pattern = "tiff-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.osgeo.org/libtiff/tiff-{version}.tar.xz"
source_dir_template = "tiff-{version}"
