name = "libvterm"
version = "0.3.3"
description = "Abstract library implementation of a VT220/xterm/ECMA-48 terminal emulator"
source = "https://github.com/neovim/libvterm/archive/refs/tags/v0.3.3.tar.gz"
sha256 = "0babe3ab42c354925dadede90d352f054aa9c4ae6842ea803a20c9741e172e56"
source_dir = "libvterm-0.3.3"
deps = ["libtool", "perl"]

build_steps = [
  "make PREFIX=/usr",
  "make PREFIX=/usr DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/neovim/libvterm/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/neovim/libvterm/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "libvterm-{version}"
