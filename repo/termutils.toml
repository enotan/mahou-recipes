name = "termutils"
version = "2.0"
description = "GNU terminal utilities"
source = "https://ftp.gnu.org/gnu/termutils/termutils-2.0.tar.gz"
sha256 = "4c2b3721a88b58b8a3918bf57b043fbd446ba334a2153a88305c9bf66f31f403"
source_dir = "termutils-2.0"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/termutils/"
version_pattern = "termutils-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/termutils/termutils-{version}.tar.gz"
source_dir_template = "termutils-{version}"
