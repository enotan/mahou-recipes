name = "unqlite"
version = "1.2.1"
description = "Embeddable NoSQL database engine"
source = "https://github.com/symisc/unqlite/archive/refs/tags/1.2.1.tar.gz"
sha256 = "3cd5f638cdea014af4879d9ba4f088c92f5cf885051c5ced3dde1ef8a62fac9c"
source_dir = "unqlite-1.2.1"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DENABLE_THREADS=ON",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/symisc/unqlite/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/symisc/unqlite/archive/refs/tags/{version}.tar.gz"
source_dir_template = "unqlite-{version}"
