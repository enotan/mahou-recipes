name = "lunzip"
version = "1.16"
description = "Decompressor for the lzip format"
source = "https://download.savannah.gnu.org/releases/lzip/lunzip/lunzip-1.16.tar.gz"
sha256 = "f13809a1aeaf953f32b07f822c3804bfb11056c08d465b93750b4e45190becda"
source_dir = "lunzip-1.16"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://download.savannah.gnu.org/releases/lzip/lunzip/"
version_pattern = "lunzip-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://download.savannah.gnu.org/releases/lzip/lunzip/lunzip-{version}.tar.gz"
source_dir_template = "lunzip-{version}"
