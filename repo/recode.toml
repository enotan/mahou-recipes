name = "recode"
version = "3.7.15"
description = "Convert files between character sets and usages"
source = "https://github.com/rrthomas/recode/releases/download/v3.7.15/recode-3.7.15.tar.gz"
sha256 = "f590407fc51badb351973fc1333ee33111f05ec83a8f954fd8cf0c5e30439806"
source_dir = "recode-3.7.15"
deps = ["libiconv"]

build_steps = [
  "./configure --prefix=/usr --disable-nls",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/rrthomas/recode/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/rrthomas/recode/releases/download/v{version}/recode-{version}.tar.gz"
source_dir_template = "recode-{version}"
