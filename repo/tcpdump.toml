name = "tcpdump"
version = "4.99.6"
description = "Command-line packet analyzer"
source = "https://www.tcpdump.org/release/tcpdump-4.99.6.tar.xz"
sha256 = "40a8cefd45f0d2a06827e6658efb830d484868c449ad80f7efb33516af44f3da"
source_dir = "tcpdump-4.99.6"
deps = ["libpcap", "openssl"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.tcpdump.org/release/"
version_pattern = "tcpdump-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.tcpdump.org/release/tcpdump-{version}.tar.xz"
source_dir_template = "tcpdump-{version}"
