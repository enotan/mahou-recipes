name = "bmon"
version = "4.0"
description = "Bandwidth monitor and rate estimator"
source = "https://github.com/tgraf/bmon/releases/download/v4.0/bmon-4.0.tar.gz"
sha256 = "02fdc312b8ceeb5786b28bf905f54328f414040ff42f45c83007f24b76cc9f7a"
source_dir = "bmon-4.0"
deps = ["libconfuse", "libnl", "ncurses"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --with-ncurses",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/tgraf/bmon/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/tgraf/bmon/releases/download/v{version}/bmon-{version}.tar.gz"
source_dir_template = "bmon-{version}"
