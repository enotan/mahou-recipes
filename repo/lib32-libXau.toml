name = "lib32-libXau"
version = "1.0.12"
description = "X11 authorization library (32-bit)"
source = "https://www.x.org/releases/individual/lib/libXau-1.0.12.tar.xz"
sha256 = "74d0e4dfa3d39ad8939e99bda37f5967aba528211076828464d2777d477fc0fb"
source_dir = "libXau-1.0.12"
deps = ["xorg-proto"]

build_steps = [
  "make distclean || true",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib/pkgconfig:/usr/share/pkgconfig ./configure --prefix=/usr --libdir=/usr/lib --host=i686-pc-linux-gnu",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXau-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libXau-{version}.tar.xz"
source_dir_template = "libXau-{version}"
