name = "wayvnc"
version = "0.10.0"
description = "VNC server for wlroots-based Wayland compositors"
source = "https://github.com/any1/wayvnc/archive/refs/tags/v0.10.0.tar.gz"
sha256 = "fcfda018d0e07ec00a80071420c8cc2a75885dc6d5e55bb50a9b12353754338f"
source_dir = "wayvnc-0.10.0"
deps = ["aml", "jansson", "libdrm", "libxkbcommon", "meson", "neatvnc", "ninja", "pixman", "wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dsystemtap=false -Dtests=false {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.man-pages]
deps = ["scdoc"]
build_flags = ["-Dman-pages=enabled"]
disabled_build_flags = ["-Dman-pages=disabled"]

[features.pam]
deps = ["pam"]
build_flags = ["-Dpam=enabled"]
disabled_build_flags = ["-Dpam=disabled"]

[features.screencopy-dmabuf]
deps = ["mesa"]
build_flags = ["-Dscreencopy-dmabuf=enabled"]
disabled_build_flags = ["-Dscreencopy-dmabuf=disabled"]

[update]
check_url = "https://github.com/any1/wayvnc/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/any1/wayvnc/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "wayvnc-{version}"
