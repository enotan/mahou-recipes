name = "pigz"
version = "2.8"
description = "Parallel implementation of gzip"
source = "https://zlib.net/pigz/pigz-2.8.tar.gz"
sha256 = "eb872b4f0e1f0ebe59c9f7bd8c506c4204893ba6a8492de31df416f0d5170fd0"
source_dir = "pigz-2.8"
deps = ["zlib"]

build_steps = [
  "make",
  "install -Dm755 pigz ${MAHOU_DESTDIR}/usr/bin/pigz",
  "ln -sf pigz ${MAHOU_DESTDIR}/usr/bin/unpigz",
  "install -Dm644 pigz.1 ${MAHOU_DESTDIR}/usr/share/man/man1/pigz.1",
]

[update]
check_url = "https://zlib.net/pigz/"
version_pattern = "pigz-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://zlib.net/pigz/pigz-{version}.tar.gz"
source_dir_template = "pigz-{version}"
