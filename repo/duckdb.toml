name = "duckdb"
version = "1.5.2"
description = "In-process analytical SQL database management system"
source = "https://github.com/duckdb/duckdb/archive/refs/tags/v1.5.2.tar.gz"
sha256 = "6d8612fc87115cf4d3512a934ada5d1669db29378b4cc8e226fdfa8f5c537385"
source_dir = "duckdb-1.5.2"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHELL=ON -DBUILD_UNITTESTS=OFF -DENABLE_UNITTEST_CPP_TESTS=OFF -DBUILD_BENCHMARKS=OFF -DDISABLE_BUILTIN_EXTENSIONS=ON -DENABLE_EXTENSION_AUTOLOADING=OFF -DENABLE_EXTENSION_AUTOINSTALL=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/duckdb/duckdb/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/duckdb/duckdb/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "duckdb-{version}"
