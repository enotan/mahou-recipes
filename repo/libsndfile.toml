name = "libsndfile"
version = "1.2.2"
description = "C library for reading and writing files containing sampled sound"
source = "https://github.com/libsndfile/libsndfile/releases/download/1.2.2/libsndfile-1.2.2.tar.xz"
sha256 = "3799ca9924d3125038880367bf1468e53a1b7e3686a934f098b7e1d286cdb80e"
source_dir = "libsndfile-1.2.2"
deps = ["flac", "libogg", "libvorbis"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/libsndfile/libsndfile/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/libsndfile/libsndfile/releases/download/{version}/libsndfile-{version}.tar.xz"
source_dir_template = "libsndfile-{version}"
