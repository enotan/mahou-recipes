name = "keyutils"
version = "1.6.3"
description = "Linux kernel key management utilities"
source = "https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git/snapshot/keyutils-1.6.3.tar.gz"
sha256 = "a61d5706136ae4c05bd48f86186bcfdbd88dd8bd5107e3e195c924cfc1b39bb4"
source_dir = "keyutils-1.6.3"
deps = []

build_steps = [
  "make PREFIX=/usr LIBDIR=/usr/lib USRLIBDIR=/usr/lib BINDIR=/usr/bin SBINDIR=/usr/bin",
  "make DESTDIR=${MAHOU_DESTDIR} PREFIX=/usr LIBDIR=/usr/lib USRLIBDIR=/usr/lib BINDIR=/usr/bin SBINDIR=/usr/bin install",
]

[update]
check_url = "https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git/refs/tags"
version_pattern = "keyutils-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git/snapshot/keyutils-{version}.tar.gz"
source_dir_template = "keyutils-{version}"
