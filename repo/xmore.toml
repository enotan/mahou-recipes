name = "xmore"
version = "1.0.4"
description = "Plain text display program for X11"
source = "https://www.x.org/releases/individual/app/xmore-1.0.4.tar.xz"
sha256 = "7eb560dbc1de4e43c64fe491ad73907a29d734cca82a9ad82c7d3feb9cdb0a9a"
source_dir = "xmore-1.0.4"
deps = ["libX11", "libXaw", "libXt", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xmore-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xmore-{version}.tar.xz"
source_dir_template = "xmore-{version}"
