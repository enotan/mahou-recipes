name = "xdotool"
version = "4.20260303.1"
description = "Command-line X11 automation tool"
source = "https://github.com/jordansissel/xdotool/archive/refs/tags/v4.20260303.1.tar.gz"
sha256 = "c1f971a384da588eb99ca0755fc4300316d49c1e612537e3f1de52215e104fa3"
source_dir = "xdotool-4.20260303.1"
deps = ["perl", "libX11", "libXtst", "libXinerama", "libxkbcommon"]

build_steps = [
  "make PREFIX=/usr INSTALLMAN=/usr/share/man WITHOUT_RPATH_FIX=1",
  "make DESTDIR=${MAHOU_DESTDIR} PREFIX=/usr INSTALLMAN=/usr/share/man WITHOUT_RPATH_FIX=1 LDCONFIG=true install",
]

[update]
check_url = "https://github.com/jordansissel/xdotool/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/jordansissel/xdotool/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "xdotool-{version}"
