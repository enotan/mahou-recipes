name = "libssh2"
version = "1.11.1"
description = "Library implementing the SSH2 protocol"
source = "https://libssh2.org/download/libssh2-1.11.1.tar.xz"
sha256 = "9954cb54c4f548198a7cbebad248bdc87dd64bd26185708a294b2b50771e3769"
source_dir = "libssh2-1.11.1"
deps = ["openssl", "zlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://libssh2.org/download/"
version_pattern = "libssh2-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://libssh2.org/download/libssh2-{version}.tar.xz"
source_dir_template = "libssh2-{version}"
