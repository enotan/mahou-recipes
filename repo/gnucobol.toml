name = "gnucobol"
version = "3.2"
description = "GNU COBOL compiler"
source = "https://ftp.gnu.org/gnu/gnucobol/gnucobol-3.2.tar.xz"
sha256 = "3bb48af46ced4779facf41fdc2ee60e4ccb86eaa99d010b36685315df39c2ee2"
source_dir = "gnucobol-3.2"
deps = ["gmp"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gnucobol/"
version_pattern = "gnucobol-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/gnucobol/gnucobol-{version}.tar.xz"
source_dir_template = "gnucobol-{version}"
