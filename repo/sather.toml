name = "sather"
version = "1.2.3"
description = "GNU Sather compiler"
source = "https://ftp.gnu.org/gnu/sather/sather-1.2.3.tar.gz"
sha256 = "1c95ecd4c081693b0acfd5d6da05efb3e98e2146510f0818342fd9b5995c8bb2"
source_dir = "sather-1.2.3"
deps = ["gc"]
build_steps = [
  "make small",
  "install -d ${MAHOU_DESTDIR}/usr/lib/sather ${MAHOU_DESTDIR}/usr/bin",
  "cp -a . ${MAHOU_DESTDIR}/usr/lib/sather/",
  "ln -sf ../lib/sather/Bin/sacomp ${MAHOU_DESTDIR}/usr/bin/sacomp",
]

[update]
check_url = "https://ftp.gnu.org/gnu/sather/"
version_pattern = "sather-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/sather/sather-{version}.tar.gz"
source_dir_template = "sather-{version}"
