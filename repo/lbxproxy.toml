name = "lbxproxy"
version = "1.0.3"
description = "Low Bandwidth X proxy"
source = "https://www.x.org/releases/individual/app/lbxproxy-1.0.3.tar.gz"
sha256 = "db36251c9656c7da720f31e10df384f8946a9a5395915371b60d9423ad8f6a80"
source_dir = "lbxproxy-1.0.3"
deps = ["libICE", "libX11", "libXext", "liblbxutil", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "lbxproxy-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/app/lbxproxy-{version}.tar.gz"
source_dir_template = "lbxproxy-{version}"
