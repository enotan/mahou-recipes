name = "wlroots"
version = "0.20.0"
description = "Pluggable, composable, unopinionated modules for building a Wayland compositor"
source = "https://gitlab.freedesktop.org/wlroots/wlroots/-/releases/0.20.0/downloads/wlroots-0.20.0.tar.gz"
sha256 = "33f52414e1b280839aeb70786f0ae2c9f54e27ad4873108d86270a2f89c4934b"
source_dir = "wlroots-0.20.0"
deps = ["libdrm", "libinput", "libxkbcommon", "mesa", "pixman", "seatd", "wayland", "wayland-protocols", "xcb-util-errors", "xcb-util-renderutil"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://gitlab.freedesktop.org/wlroots/wlroots/-/releases"
version_pattern = "wlroots-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://gitlab.freedesktop.org/wlroots/wlroots/-/releases/{version}/downloads/wlroots-{version}.tar.gz"
source_dir_template = "wlroots-{version}"
