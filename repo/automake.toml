name = "automake"
version = "1.18.1"
description = "GNU build system generator"
source = "https://ftpmirror.gnu.org/automake/automake-1.18.1.tar.xz"
sha256 = "168aa363278351b89af56684448f525a5bce5079d0b6842bd910fdd3f1646887"
source_dir = "automake-1.18.1"
deps = ["autoconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/automake/"
version_pattern = "automake-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftpmirror.gnu.org/automake/automake-{version}.tar.xz"
source_dir_template = "automake-{version}"
