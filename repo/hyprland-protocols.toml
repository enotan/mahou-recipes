name = "hyprland-protocols"
version = "0.7.0"
description = "Wayland protocol extensions for Hyprland"
source = "https://github.com/hyprwm/hyprland-protocols/archive/refs/tags/v0.7.0.tar.gz"
sha256 = "ee419006d7cd20927b9b7c8b5fc430571c151b0385d600508de1a7957294498c"
source_dir = "hyprland-protocols-0.7.0"
deps = ["meson", "ninja"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/hyprwm/hyprland-protocols/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/hyprwm/hyprland-protocols/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "hyprland-protocols-{version}"
