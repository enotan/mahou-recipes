name = "git"
version = "2.54.0"
description = "Stupid content tracker: distributed VCS designed for speed and efficiency"
source = "https://www.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz"
sha256 = "f689162364c10de79ef89aa8dbf48731eb057e34edbbd20aca510ce0154681a3"
source_dir = "git-2.54.0"
deps = ["curl", "expat", "openssl", "pcre2", "zlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.kernel.org/pub/software/scm/git/"
version_pattern = "git-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.kernel.org/pub/software/scm/git/git-{version}.tar.xz"
source_dir_template = "git-{version}"
