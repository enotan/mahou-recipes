name = "qdbm"
version = "1.8.78"
description = "Quick Database Manager"
source = "https://dbmx.net/qdbm/qdbm-1.8.78.tar.gz"
sha256 = "b466fe730d751e4bfc5900d1f37b0fb955f2826ac456e70012785e012cdcb73e"
source_dir = "qdbm-1.8.78"
deps = ["bzip2", "zlib"]

build_steps = [
  "./configure --prefix=/usr --enable-zlib --enable-bzip --enable-pthread --disable-warn",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://dbmx.net/qdbm/"
version_pattern = "qdbm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://dbmx.net/qdbm/qdbm-{version}.tar.gz"
source_dir_template = "qdbm-{version}"
