name = "libmatheval"
version = "1.1.11"
description = "Library for parsing and evaluating symbolic expressions"
source = "https://ftp.gnu.org/gnu/libmatheval/libmatheval-1.1.11.tar.gz"
sha256 = "474852d6715ddc3b6969e28de5e1a5fbaff9e8ece6aebb9dc1cc63e9e88e89ab"
source_dir = "libmatheval-1.1.11"
deps = ["guile"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/libmatheval/"
version_pattern = "libmatheval-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/libmatheval/libmatheval-{version}.tar.gz"
source_dir_template = "libmatheval-{version}"
