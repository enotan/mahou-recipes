name = "tig"
version = "2.6.0"
description = "Text-mode interface for Git"
source = "https://github.com/jonas/tig/releases/download/tig-2.6.0/tig-2.6.0.tar.gz"
sha256 = "99d4a0fdd3d93547ebacfe511195cb92e4f75b91644c06293c067f401addeb3e"
source_dir = "tig-2.6.0"
deps = ["git", "ncurses", "readline"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --without-pcre",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install install-release-doc-man",
]

[update]
check_url = "https://github.com/jonas/tig/releases"
version_pattern = "/releases/tag/tig-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/jonas/tig/releases/download/tig-{version}/tig-{version}.tar.gz"
source_dir_template = "tig-{version}"
