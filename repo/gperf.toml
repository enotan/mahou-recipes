name = "gperf"
version = "3.3"
description = "Perfect hash function generator"
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/gperf/"

source = "https://ftp.gnu.org/gnu/gperf/gperf-3.3.tar.gz"
sha256 = "fd87e0aba7e43ae054837afd6cd4db03a3f2693deb3619085e6ed9d8d9604ad8"
source_dir = "gperf-3.3"

deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gperf/"
version_pattern = "gperf-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/gperf/gperf-{version}.tar.gz"
source_dir_template = "gperf-{version}"
