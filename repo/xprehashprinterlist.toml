name = "xprehashprinterlist"
version = "1.0.1"
description = "Refresh the Xprint printer list"
source = "https://www.x.org/releases/individual/app/xprehashprinterlist-1.0.1.tar.gz"
sha256 = "396986da064b584138cfcff79a8aed12590a9dab24f1cd2d80b08bc1cb896a43"
source_dir = "xprehashprinterlist-1.0.1"
deps = ["libX11", "libXp", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xprehashprinterlist-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/app/xprehashprinterlist-{version}.tar.gz"
source_dir_template = "xprehashprinterlist-{version}"
