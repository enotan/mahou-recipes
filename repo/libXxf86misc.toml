name = "libXxf86misc"
version = "1.0.4"
description = "XFree86-Misc extension client library"
source = "https://www.x.org/releases/individual/lib/libXxf86misc-1.0.4.tar.gz"
sha256 = "63a68b2fafd03236f9b0135de21976e9194d6d811ca2fd774c13a6b4be576676"
source_dir = "libXxf86misc-1.0.4"
deps = ["libX11", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXxf86misc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/lib/libXxf86misc-{version}.tar.gz"
source_dir_template = "libXxf86misc-{version}"
