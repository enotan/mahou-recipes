name = "xtrap"
version = "1.0.3"
description = "X Trap extension command-line utility"
source = "https://www.x.org/releases/individual/app/xtrap-1.0.3.tar.gz"
sha256 = "c6b86b921a748acbf1d82590fbd9c4575f970220760088f0e0efac6fd93d6dc3"
source_dir = "xtrap-1.0.3"
deps = ["libX11", "libXTrap", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xtrap-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/app/xtrap-{version}.tar.gz"
source_dir_template = "xtrap-{version}"
