name = "smalltalk"
version = "3.2.5"
description = "GNU Smalltalk implementation"
source = "https://ftp.gnu.org/gnu/smalltalk/smalltalk-3.2.5.tar.xz"
sha256 = "819a15f7ba8a1b55f5f60b9c9a58badd6f6153b3f987b70e7b167e7755d65acc"
source_dir = "smalltalk-3.2.5"
deps = ["gmp", "libffi", "readline"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/smalltalk/"
version_pattern = "smalltalk-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/smalltalk/smalltalk-{version}.tar.xz"
source_dir_template = "smalltalk-{version}"
