name = "liblbxutil"
version = "1.1.0"
description = "Low Bandwidth X utility library"
source = "https://www.x.org/releases/individual/lib/liblbxutil-1.1.0.tar.gz"
sha256 = "285c1bc688cc71ec089e9284f2566d1780cc5d90816e9997890af8689f386951"
source_dir = "liblbxutil-1.1.0"
deps = ["xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "liblbxutil-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/lib/liblbxutil-{version}.tar.gz"
source_dir_template = "liblbxutil-{version}"
