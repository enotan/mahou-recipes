name = "iperf3"
version = "3.21"
description = "TCP, UDP, and SCTP network bandwidth measurement tool"
source = "https://downloads.es.net/pub/iperf/iperf-3.21.tar.gz"
sha256 = "656e4405ebd620121de7ceca3eaf43a88f79ea1b857d041a6a0b1314801acdd8"
source_dir = "iperf-3.21"
deps = ["openssl"]

build_steps = [
  "./configure --prefix=/usr --with-openssl=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/esnet/iperf/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://downloads.es.net/pub/iperf/iperf-{version}.tar.gz"
source_dir_template = "iperf-{version}"
