name = "libinput"
version = "1.31.2"
description = "Library to handle input devices in Wayland"
source = "https://gitlab.freedesktop.org/libinput/libinput/-/archive/1.31.2/libinput-1.31.2.tar.bz2"
sha256 = "1daebac6cb5b8946139c9669a7e5c0e4c8f17320de232a6b9bf470f37dc569e4"
source_dir = "libinput-1.31.2"
deps = ["libevdev", "libwacom", "mtdev"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://gitlab.freedesktop.org/libinput/libinput/-/tags"
version_pattern = "libinput-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://gitlab.freedesktop.org/libinput/libinput/-/archive/{version}/libinput-{version}.tar.bz2"
source_dir_template = "libinput-{version}"
