name = "lftp"
version = "4.9.3"
description = "Sophisticated command-line file transfer program"
source = "https://lftp.yar.ru/ftp/lftp-4.9.3.tar.xz"
sha256 = "96e7199d7935be33cf6b1161e955b2aab40ab77ecdf2a19cea4fc1193f457edc"
source_dir = "lftp-4.9.3"
deps = []

build_steps = [
  "./configure --prefix=/usr --without-gnutls {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.expat]
deps = ["expat"]
build_flags = ["--with-expat=/usr"]
disabled_build_flags = ["--with-expat=no"]

[features.readline]
deps = ["readline"]
build_flags = ["--with-readline=/usr"]
disabled_build_flags = ["--with-readline=no"]

[features.ssl]
deps = ["openssl"]
build_flags = ["--with-openssl=/usr"]
disabled_build_flags = ["--without-openssl"]

[features.zlib]
deps = ["zlib"]
build_flags = ["--with-zlib=/usr"]
disabled_build_flags = ["--without-zlib"]

[update]
check_url = "https://lftp.yar.ru/ftp/"
version_pattern = "lftp-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://lftp.yar.ru/ftp/lftp-{version}.tar.xz"
source_dir_template = "lftp-{version}"
