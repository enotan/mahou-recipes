name = "mpfr"
version = "4.2.2"
description = "Multiple-precision floating-point library"
license = "LGPL-3.0-or-later"
homepage = "https://www.mpfr.org/"

source = "https://www.mpfr.org/mpfr-4.2.2/mpfr-4.2.2.tar.xz"
sha256 = "b67ba0383ef7e8a8563734e2e889ef5ec3c3b898a01d00fa0a6869ad81c6ce01"
source_dir = "mpfr-4.2.2"

deps = ["gmp"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.mpfr.org/mpfr-current/"
version_pattern = "mpfr-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.xz"
source_template = "https://www.mpfr.org/mpfr-{version}/mpfr-{version}.tar.xz"
source_dir_template = "mpfr-{version}"
