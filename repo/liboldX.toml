name = "liboldX"
version = "1.0.1"
description = "Compatibility library for old X11 APIs"
source = "https://www.x.org/releases/individual/lib/liboldX-1.0.1.tar.gz"
sha256 = "74322dbf04df69787485eb24b16e12783dfc3454befaf18482ead51bd7b55dc8"
source_dir = "liboldX-1.0.1"
deps = ["libX11", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "liboldX-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/lib/liboldX-{version}.tar.gz"
source_dir_template = "liboldX-{version}"
