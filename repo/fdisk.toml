description = "GNU fdisk partitioning tool"
source = "https://ftp.gnu.org/gnu/fdisk/fdisk-1.3.0a.tar.gz"
sha256 = "211ebf0896cbe4d29bdf1195ef7cef541a4c55f77ce98cce62b7c2019cea7593"
source_dir = "fdisk-1.3.0a"
