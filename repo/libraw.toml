name = "libraw"
version = "0.22.1"
description = "RAW image decoding library"
source = "https://www.libraw.org/data/LibRaw-0.22.1.tar.gz"
sha256 = "a789dc4e2409e2901d93793a4e0b80c7b49d0d97cf6ad71c850eb7616acfd786"
source_dir = "LibRaw-0.22.1"
deps = ["lcms", "libjpeg-turbo", "pkgconf", "zlib"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --enable-jpeg --enable-zlib --enable-lcms",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.libraw.org/download"
version_pattern = "LibRaw-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.libraw.org/data/LibRaw-{version}.tar.gz"
source_dir_template = "LibRaw-{version}"
