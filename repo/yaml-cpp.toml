name = "yaml-cpp"
version = "0.9.0"
description = "YAML parser and emitter in C++"
source = "https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-0.9.0.tar.gz"
sha256 = "25cb043240f828a8c51beb830569634bc7ac603978e0f69d6b63558dadefd49a"
source_dir = "yaml-cpp-yaml-cpp-0.9.0"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/jbeder/yaml-cpp/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"yaml-cpp-([^\"]+)\""
source_template = "https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-{version}.tar.gz"
source_dir_template = "yaml-cpp-yaml-cpp-{version}"
