name = "glibmm"
version = "2.66.8"
description = "C++ interface for GLib"
source = "https://download.gnome.org/sources/glibmm/2.66/glibmm-2.66.8.tar.xz"
sha256 = "64f11d3b95a24e2a8d4166ecff518730f79ecc27222ef41faf7c7e0340fc9329"
source_dir = "glibmm-2.66.8"
deps = ["glib", "libsigc++", "mm-common"]

build_steps = [
  "meson setup build --prefix=/usr --libdir=lib --buildtype=release --wrap-mode=nofallback -Dmaintainer-mode=false -Dbuild-documentation=false -Dbuild-examples=false",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.gnome.org/sources/glibmm/2.66/"
version_pattern = "glibmm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/glibmm/2.66/glibmm-{version}.tar.xz"
source_dir_template = "glibmm-{version}"
