name = "glibmm"
version = "2.88.0"
description = "C++ interface for GLib"
source = "https://download.gnome.org/sources/glibmm/2.88/glibmm-2.88.0.tar.xz"
sha256 = "a6549da3a6c43de83b8717dae5413c57a60d92f6ecc624615c612d0bb0ad0fe2"
source_dir = "glibmm-2.88.0"
deps = ["glib", "libsigc++"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.gnome.org/sources/glibmm/2.88/"
version_pattern = "glibmm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/glibmm/2.88/glibmm-{version}.tar.xz"
source_dir_template = "glibmm-{version}"
