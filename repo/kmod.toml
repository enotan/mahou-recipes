name = "kmod"
version = "34"
description = "Linux kernel module management tools and library"
source = "https://www.kernel.org/pub/linux/utils/kernel/kmod/kmod-34.tar.xz"
sha256 = "12e7884484151fbd432b6a520170ea185c159f4393c7a2c2a886ab820313149a"
source_dir = "kmod-34"
deps = []

build_steps = [
  "meson setup build --prefix=/usr --libdir=lib --buildtype=release -Dmanpages=false -Ddocs=false -Dbuild-tests=false {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.openssl]
deps = ["openssl"]
build_flags = ["-Dopenssl=enabled"]
disabled_build_flags = ["-Dopenssl=disabled"]

[features.xz]
deps = ["xz"]
build_flags = ["-Dxz=enabled"]
disabled_build_flags = ["-Dxz=disabled"]

[features.zlib]
deps = ["zlib"]
build_flags = ["-Dzlib=enabled"]
disabled_build_flags = ["-Dzlib=disabled"]

[features.zstd]
deps = ["zstd"]
build_flags = ["-Dzstd=enabled"]
disabled_build_flags = ["-Dzstd=disabled"]

[update]
check_url = "https://www.kernel.org/pub/linux/utils/kernel/kmod/"
version_pattern = "kmod-([0-9]+)\\.tar\\.xz"
source_template = "https://www.kernel.org/pub/linux/utils/kernel/kmod/kmod-{version}.tar.xz"
source_dir_template = "kmod-{version}"
