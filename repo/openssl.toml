name = "openssl"
version = "4.0.0"
description = "Robust, full-featured Open Source Toolkit for the Transport Layer Security (TLS)"
source = "https://github.com/openssl/openssl/releases/download/openssl-4.0.0/openssl-4.0.0.tar.gz"
sha256 = "c32cf49a959c4f345f9606982dd36e7d28f7c58b19c2e25d75624d2b3d2f79ac"
source_dir = "openssl-4.0.0"
deps = ["zlib"]

build_steps = [
  "./Configure --prefix=/usr --openssldir=/etc/ssl",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install_sw",
]

[update]
check_url = "https://github.com/openssl/openssl/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/openssl/openssl/releases/download/openssl-{version}/openssl-{version}.tar.gz"
source_dir_template = "openssl-{version}"
