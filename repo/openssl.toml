name = "openssl"
version = "3.6.2"
description = "Robust, full-featured Open Source Toolkit for the Transport Layer Security (TLS)"
source = "https://github.com/openssl/openssl/releases/download/openssl-3.6.2/openssl-3.6.2.tar.gz"
sha256 = "aaf51a1fe064384f811daeaeb4ec4dce7340ec8bd893027eee676af31e83a04f"
source_dir = "openssl-3.6.2"
deps = ["zlib"]

build_steps = [
  "./Configure --prefix=/usr --openssldir=/etc/ssl",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install_sw",
]

[update]
check_url = "https://openssl-library.org/source/index.html"
version_pattern = "openssl-(3\\.6\\.[0-9]+)\\.tar\\.gz"
source_template = "https://github.com/openssl/openssl/releases/download/openssl-{version}/openssl-{version}.tar.gz"
source_dir_template = "openssl-{version}"
