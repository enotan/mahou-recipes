name = "gnugo"
version = "3.8"
description = "GNU Go game engine"
source = "https://ftp.gnu.org/gnu/gnugo/gnugo-3.8.tar.gz"
sha256 = "da68d7a65f44dcf6ce6e4e630b6f6dd9897249d34425920bfdd4e07ff1866a72"
source_dir = "gnugo-3.8"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gnugo/"
version_pattern = "gnugo-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/gnugo/gnugo-{version}.tar.gz"
source_dir_template = "gnugo-{version}"
