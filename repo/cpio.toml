name = "cpio"
version = "2.15"
description = "File archival tool which can also read and write tar files"
source = "https://ftpmirror.gnu.org/cpio/cpio-2.15.tar.bz2"
sha256 = "937610b97c329a1ec9268553fb780037bcfff0dcffe9725ebc4fd9c1aa9075db"
source_dir = "cpio-2.15"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/cpio/"
version_pattern = "cpio-([0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://ftpmirror.gnu.org/cpio/cpio-{version}.tar.bz2"
source_dir_template = "cpio-{version}"
