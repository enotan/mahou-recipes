name = "gdk-pixbuf"
version = "2.42.12"
description = "Image loading library for GTK applications"
source = "https://download.gnome.org/sources/gdk-pixbuf/2.42/gdk-pixbuf-2.42.12.tar.xz"
sha256 = "b9505b3445b9a7e48ced34760c3bcb73e966df3ac94c95a148cb669ab748e3c7"
source_dir = "gdk-pixbuf-2.42.12"
deps = ["glib", "libjpeg-turbo", "libpng", "tiff"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://download.gnome.org/sources/gdk-pixbuf/2.42/"
version_pattern = "gdk-pixbuf-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/gdk-pixbuf/2.42/gdk-pixbuf-{version}.tar.xz"
source_dir_template = "gdk-pixbuf-{version}"
