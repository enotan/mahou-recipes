name = "fastfetch"
version = "2.63.1"
description = "Fast neofetch-like system information tool"
source = "https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.63.1.tar.gz"
sha256 = "6e124699ea20fb02c5bc402c0012543303ee75ca55ad664f96bc6cd414d7e6b3"
source_dir = "fastfetch-2.63.1"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/fastfetch-cli/fastfetch/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/{version}.tar.gz"
source_dir_template = "fastfetch-{version}"
