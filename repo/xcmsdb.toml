name = "xcmsdb"
version = "1.0.7"
description = "Load X Color Management System device color data"
source = "https://www.x.org/releases/individual/app/xcmsdb-1.0.7.tar.xz"
sha256 = "5ec4068e488187b05ea92ee1362c96b78a90f19ccc7a1844c5921d70626bbc38"
source_dir = "xcmsdb-1.0.7"
deps = ["libX11", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xcmsdb-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
