name = "uthash"
version = "2.3.0"
description = "Header-only hash table and utility macros for C"
source = "https://github.com/troydhanson/uthash/archive/refs/tags/v2.3.0.tar.gz"
sha256 = "e10382ab75518bad8319eb922ad04f907cb20cccb451a3aa980c9d005e661acc"
source_dir = "uthash-2.3.0"
deps = []

build_steps = [
  "mkdir -p ${MAHOU_DESTDIR}/usr/include",
  "install -m644 src/uthash.h src/utarray.h src/utlist.h src/utringbuffer.h src/utstack.h src/utstring.h ${MAHOU_DESTDIR}/usr/include/",
]

[update]
check_url = "https://api.github.com/repos/troydhanson/uthash/tags?per_page=1"
version_pattern = "\"name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/troydhanson/uthash/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "uthash-{version}"
