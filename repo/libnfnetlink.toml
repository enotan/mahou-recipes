name = "libnfnetlink"
version = "1.0.2"
description = "Low-level library for netfilter kernel/userspace messaging"
source = "https://www.netfilter.org/pub/libnfnetlink/libnfnetlink-1.0.2.tar.bz2"
sha256 = "b064c7c3d426efb4786e60a8e6859b82ee2f2c5e49ffeea640cfe4fe33cbc376"
source_dir = "libnfnetlink-1.0.2"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://git.netfilter.org/libnfnetlink/refs/tags"
version_pattern = "libnfnetlink-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://www.netfilter.org/pub/libnfnetlink/libnfnetlink-{version}.tar.bz2"
source_dir_template = "libnfnetlink-{version}"
