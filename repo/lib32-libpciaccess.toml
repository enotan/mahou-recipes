name = "lib32-libpciaccess"
version = "0.19"
description = "Generic PCI access library (32-bit)"
source = "https://www.x.org/releases/individual/lib/libpciaccess-0.19.tar.xz"
sha256 = "3c55aa86c82e54a4e3109786f0463530d53b36b6d1cfd14616454f985dd2aa43"
source_dir = "libpciaccess-0.19"
deps = ["lib32-zlib"]

build_steps = [
  "make distclean || true",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib32/pkgconfig:/usr/share/pkgconfig ./configure --prefix=/usr --libdir=/usr/lib32 --host=i686-pc-linux-gnu",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libpciaccess-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libpciaccess-{version}.tar.xz"
source_dir_template = "libpciaccess-{version}"
