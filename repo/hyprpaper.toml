name = "hyprpaper"
version = "0.8.4"
description = "Fast Wayland wallpaper utility for Hyprland"
source = "https://github.com/hyprwm/hyprpaper/archive/refs/tags/v0.8.4.tar.gz"
sha256 = "4912c7aede303918f38a3fc6b294429e2d541b639ebba67bcab58d1d367ea360"
source_dir = "hyprpaper-0.8.4"
deps = ["cmake", "file", "hyprlang", "hyprtoolkit", "hyprutils", "hyprwayland-scanner", "hyprwire", "libdrm", "pixman", "pkgconf", "wayland", "wayland-protocols"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/hyprwm/hyprpaper/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/hyprwm/hyprpaper/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "hyprpaper-{version}"
