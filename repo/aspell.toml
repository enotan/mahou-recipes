name = "aspell"
version = "0.60.8.2"
description = "GNU spell checker"
source = "https://ftp.gnu.org/gnu/aspell/aspell-0.60.8.2.tar.gz"
sha256 = "57fe4863eae6048f72245a8575b44b718fb85ca14b9f8c0afc41b254dfd76919"
source_dir = "aspell-0.60.8.2"
deps = ["gettext", "ncurses"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --enable-curses=ncursesw",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/aspell/"
version_pattern = "aspell-([0-9]+\\.[0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/aspell/aspell-{version}.tar.gz"
source_dir_template = "aspell-{version}"
