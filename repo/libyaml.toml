name = "libyaml"
version = "0.2.5"
description = "YAML 1.1 parser and emitter written in C"
source = "https://github.com/yaml/libyaml/archive/0.2.5.tar.gz"
sha256 = "fa240dbf262be053f3898006d502d514936c818e422afdcf33921c63bed9bf2e"
source_dir = "libyaml-0.2.5"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/yaml/libyaml/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/yaml/libyaml/archive/{version}.tar.gz"
source_dir_template = "libyaml-{version}"
