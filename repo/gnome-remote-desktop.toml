name = "gnome-remote-desktop"
version = "50.1"
description = "Remote desktop service for GNOME"
source = "https://download.gnome.org/sources/gnome-remote-desktop/50/gnome-remote-desktop-50.1.tar.xz"
sha256 = "089049119e1f2442fe9773f0285365cedc207f4cbc7ce9af388e153668e2b171"
source_dir = "gnome-remote-desktop-50.1"
deps = ["glib", "gtk4", "gsettings-desktop-schemas"]
build_steps = ["meson setup build --prefix=/usr --buildtype=release", "ninja -C build", "DESTDIR=${MAHOU_DESTDIR} ninja -C build install"]

[update]
check_url = "https://download.gnome.org/sources/gnome-remote-desktop/50/"
version_pattern = "gnome-remote-desktop-([^\"/]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/gnome-remote-desktop/50/gnome-remote-desktop-{version}.tar.xz"
source_dir_template = "gnome-remote-desktop-{version}"
