name = "util-linux"
version = "2.41.4"
description = "Various useful Linux utilities"
source = "https://www.kernel.org/pub/linux/utils/util-linux/v2.41/util-linux-2.41.4.tar.xz"
sha256 = "a8c213cc06048862602a42b2d299b340001f6d05c4407b549f3e03521df83688"
source_dir = "util-linux-2.41.4"
deps = ["ncurses", "readline", "zlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.kernel.org/pub/linux/utils/util-linux/v2.41/"
version_pattern = "util-linux-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.kernel.org/pub/linux/utils/util-linux/v2.41/util-linux-{version}.tar.xz"
source_dir_template = "util-linux-{version}"
