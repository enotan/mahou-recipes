name = "hiredis"
version = "1.3.0"
description = "Minimalistic C client library for Redis"
source = "https://github.com/redis/hiredis/archive/refs/tags/v1.3.0.tar.gz"
sha256 = "25cee4500f359cf5cad3b51ed62059aadfc0939b05150c1f19c7e2829123631c"
source_dir = "hiredis-1.3.0"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DENABLE_SSL=OFF -DENABLE_EXAMPLES=OFF -DENABLE_SSL_TESTS=OFF -DENABLE_ASYNC_TESTS=OFF -DENABLE_NUGET=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/redis/hiredis/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/redis/hiredis/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "hiredis-{version}"
