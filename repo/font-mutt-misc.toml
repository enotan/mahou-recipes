name = "font-mutt-misc"
version = "1.0.4"
description = "Mutt miscellaneous bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-mutt-misc-1.0.4.tar.xz"
sha256 = "b12359f4e12c23bcfcb448b918297e975fa91bef5293d88d3c25343cc768bb24"
source_dir = "font-mutt-misc-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-mutt-misc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-mutt-misc-{version}.tar.xz"
source_dir_template = "font-mutt-misc-{version}"
