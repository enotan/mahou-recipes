name = "lib32-libxcb"
version = "1.17.0"
description = "X C-language Bindings library (32-bit)"
source = "https://xorg.freedesktop.org/archive/individual/xcb/libxcb-1.17.0.tar.xz"
sha256 = "599ebf9996710fea71622e6e184f3a8ad5b43d0e5fa8c4e407123c88a59a6d55"
source_dir = "libxcb-1.17.0"
deps = ["lib32-libXau", "lib32-libXdmcp", "xcb-proto", "xorg-proto"]

build_steps = [
  "make distclean || true",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib32/pkgconfig:/usr/share/pkgconfig ./configure --prefix=/usr --libdir=/usr/lib32 --host=i686-pc-linux-gnu",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://xorg.freedesktop.org/archive/individual/xcb/"
version_pattern = "libxcb-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://xorg.freedesktop.org/archive/individual/xcb/libxcb-{version}.tar.xz"
source_dir_template = "libxcb-{version}"
