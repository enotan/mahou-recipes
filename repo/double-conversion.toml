name = "double-conversion"
version = "3.4.0"
description = "Binary-decimal and decimal-binary floating point conversion routines"
source = "https://github.com/google/double-conversion/archive/refs/tags/v3.4.0.tar.gz"
sha256 = "42fd4d980ea86426e457b24bdfa835a6f5ad9517ddb01cdb42b99ab9c8dd5dc9"
source_dir = "double-conversion-3.4.0"
deps = ["cmake"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/google/double-conversion/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/google/double-conversion/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "double-conversion-{version}"
