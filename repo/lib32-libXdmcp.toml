name = "lib32-libXdmcp"
version = "1.1.5"
description = "X11 Display Manager Control Protocol library (32-bit)"
source = "https://www.x.org/releases/individual/lib/libXdmcp-1.1.5.tar.xz"
sha256 = "d8a5222828c3adab70adf69a5583f1d32eb5ece04304f7f8392b6a353aa2228c"
source_dir = "libXdmcp-1.1.5"
deps = ["xorg-proto"]

build_steps = [
  "make distclean || true",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib32/pkgconfig:/usr/share/pkgconfig ./configure --prefix=/usr --libdir=/usr/lib32 --host=i686-pc-linux-gnu",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXdmcp-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libXdmcp-{version}.tar.xz"
source_dir_template = "libXdmcp-{version}"
