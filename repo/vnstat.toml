name = "vnstat"
version = "2.13"
description = "Console network traffic monitor with persistent statistics"
source = "https://humdi.net/vnstat/vnstat-2.13.tar.gz"
sha256 = "c9fe19312d1ec3ddfbc4672aa951cf9e61ca98dc14cad3d3565f7d9803a6b187"
source_dir = "vnstat-2.13"
deps = ["sqlite"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

