name = "gcc"
version = "16.1.0"
description = "GNU Compiler Collection"
source = "https://ftp.gnu.org/gnu/gcc/gcc-16.1.0/gcc-16.1.0.tar.xz"
sha256 = "50efb4d94c3397aff3b0d61a5abd748b4dd31d9d3f2ab7be05b171d36a510f79"
source_dir = "gcc-16.1.0"
deps = ["gmp", "mpc", "mpfr", "zlib"]

build_steps = [
  "mkdir -p build",
  "cd build && ../configure --prefix=/usr --enable-languages=c,c++ --disable-multilib --with-system-zlib",
  "make -C build",
  "make -C build DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gcc/"
version_pattern = "gcc-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://ftp.gnu.org/gnu/gcc/gcc-{version}/gcc-{version}.tar.xz"
source_dir_template = "gcc-{version}"
