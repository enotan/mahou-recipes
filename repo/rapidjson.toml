name = "rapidjson"
version = "1.1.0"
description = "Fast JSON parser and generator for C++"
source = "https://github.com/Tencent/rapidjson/archive/refs/tags/v1.1.0.tar.gz"
sha256 = "bf7ced29704a1e696fbccf2a2b4ea068e7774fa37f6d7dd4039d0787f8bed98e"
source_dir = "rapidjson-1.1.0"
deps = ["cmake"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DRAPIDJSON_BUILD_DOC=OFF -DRAPIDJSON_BUILD_EXAMPLES=OFF -DRAPIDJSON_BUILD_TESTS=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/Tencent/rapidjson/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/Tencent/rapidjson/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "rapidjson-{version}"
