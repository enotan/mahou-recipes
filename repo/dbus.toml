name = "dbus"
version = "1.16.2"
description = "A message bus system, a simple way for applications to talk to each other"
source = "https://dbus.freedesktop.org/releases/dbus/dbus-1.16.2.tar.xz"
sha256 = "0ba2a1a4b16afe7bceb2c07e9ce99a8c2c3508e5dec290dbb643384bd6beb7e2"
source_dir = "dbus-1.16.2"
deps = ["expat"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://dbus.freedesktop.org/releases/dbus/"
version_pattern = "dbus-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://dbus.freedesktop.org/releases/dbus/dbus-{version}.tar.xz"
source_dir_template = "dbus-{version}"
