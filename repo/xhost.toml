name = "xhost"
version = "1.0.10"
description = "Server access control program for X"
source = "https://www.x.org/releases/individual/app/xhost-1.0.10.tar.xz"
sha256 = "a8afd70059479c712948b895e41c35a4a8bfcede3ba2d5a4b855c88bbb725be1"
source_dir = "xhost-1.0.10"
deps = ["libX11", "libXau", "libXmu", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xhost-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xhost-{version}.tar.xz"
source_dir_template = "xhost-{version}"
