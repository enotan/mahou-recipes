name = "json-glib"
version = "1.10.8"
description = "GLib JSON parsing and generation library"
source = "https://download.gnome.org/sources/json-glib/1.10/json-glib-1.10.8.tar.xz"
sha256 = "55c5c141a564245b8f8fbe7698663c87a45a7333c2a2c56f06f811ab73b212dd"
source_dir = "json-glib-1.10.8"
deps = ["glib"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Ddocumentation=disabled -Dtests=false -Dconformance=false -Dinstalled_tests=false {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.introspection]
deps = ["gobject-introspection"]
build_flags = ["-Dintrospection=enabled"]
disabled_build_flags = ["-Dintrospection=disabled"]

[update]
check_url = "https://download.gnome.org/sources/json-glib/1.10/"
version_pattern = "json-glib-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/json-glib/1.10/json-glib-{version}.tar.xz"
source_dir_template = "json-glib-{version}"
