name = "xlsatoms"
version = "1.1.4"
description = "List interned atoms on an X server"
source = "https://www.x.org/releases/individual/app/xlsatoms-1.1.4.tar.xz"
sha256 = "f4bfa15f56c066d326a5d5b292646708f25b9247506840b9047cd2687dcc71b7"
source_dir = "xlsatoms-1.1.4"
deps = ["libX11", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
