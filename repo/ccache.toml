name = "ccache"
version = "4.13.6"
description = "Compiler cache"
source = "https://github.com/ccache/ccache/releases/download/v4.13.6/ccache-4.13.6.tar.xz"
sha256 = "a7de667ca08cf67c3c8af9f213f6aa701a1188a2b3163fb74483858ce5e79fbb"
source_dir = "ccache-4.13.6"
deps = ["cmake", "xxhash", "zstd"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DENABLE_DOCUMENTATION=OFF -DENABLE_TESTING=OFF -DREDIS_STORAGE_BACKEND=OFF -DHTTP_STORAGE_BACKEND=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/ccache/ccache/releases"
version_pattern = "ccache-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://github.com/ccache/ccache/releases/download/v{version}/ccache-{version}.tar.xz"
source_dir_template = "ccache-{version}"
