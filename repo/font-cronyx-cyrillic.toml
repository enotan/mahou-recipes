name = "font-cronyx-cyrillic"
version = "1.0.4"
description = "Cronyx Cyrillic bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-cronyx-cyrillic-1.0.4.tar.xz"
sha256 = "dc0781ce0dcbffdbf6aae1a00173a13403f92b0de925bca5a9e117e4e2d6b789"
source_dir = "font-cronyx-cyrillic-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-cronyx-cyrillic-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-cronyx-cyrillic-{version}.tar.xz"
source_dir_template = "font-cronyx-cyrillic-{version}"
