name = "font-schumacher-misc"
version = "1.1.3"
description = "Schumacher miscellaneous bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-schumacher-misc-1.1.3.tar.xz"
sha256 = "8b849f0cdb1e55a34cc3dd8b0fb37443fabbc224d5ba44085569581244a68070"
source_dir = "font-schumacher-misc-1.1.3"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-schumacher-misc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-schumacher-misc-{version}.tar.xz"
source_dir_template = "font-schumacher-misc-{version}"
