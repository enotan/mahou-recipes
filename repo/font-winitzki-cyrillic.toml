name = "font-winitzki-cyrillic"
version = "1.0.4"
description = "Winitzki Cyrillic bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-winitzki-cyrillic-1.0.4.tar.xz"
sha256 = "3b6d82122dc14776e3afcd877833a7834e1f900c53fc1c7bb2d67c781cfa97a8"
source_dir = "font-winitzki-cyrillic-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-winitzki-cyrillic-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-winitzki-cyrillic-{version}.tar.xz"
source_dir_template = "font-winitzki-cyrillic-{version}"
