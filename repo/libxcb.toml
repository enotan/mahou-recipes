name = "libxcb"
version = "1.17.0"
description = "X C-language Bindings library"
source = "https://xorg.freedesktop.org/archive/individual/xcb/libxcb-1.17.0.tar.xz"
sha256 = "599ebf9996710fea71622e6e184f3a8ad5b43d0e5fa8c4e407123c88a59a6d55"
source_dir = "libxcb-1.17.0"
deps = ["libXau", "libXdmcp", "xcb-proto", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://xorg.freedesktop.org/archive/individual/xcb/"
version_pattern = "libxcb-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
