name = "lib32-mesa"
version = "26.0.7"
description = "OpenGL-like graphic library for Linux (32-bit)"
source = "https://archive.mesa3d.org/mesa-26.0.7.tar.xz"
sha256 = "0c56bbcf1947e1a6a90ac09b129b0ca0cb52cc31145b94595e57c8804cf02496"
source_dir = "mesa-26.0.7"
deps = ["lib32-expat", "lib32-libdrm", "lib32-libffi", "lib32-libglvnd", "lib32-libX11", "lib32-libXext", "lib32-zlib", "llvm", "wayland", "wayland-protocols"]

build_steps = [
  "rm -rf build-32",
  "CFLAGS='-m32 -O2' CXXFLAGS='-m32 -O2' LDFLAGS='-m32' PKG_CONFIG_LIBDIR=/usr/lib/pkgconfig:/usr/share/pkgconfig meson setup build-32 --prefix=/usr --libdir=lib --buildtype=release -Dgallium-drivers=iris,crocus,i915,llvmpipe,softpipe '-Dvulkan-drivers=[]' -Dgallium-rusticl=false '-Dtools=[]'",
  "ninja -C build-32",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build-32 install",
]

[update]
check_url = "https://archive.mesa3d.org/"
version_pattern = "mesa-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://archive.mesa3d.org/mesa-{version}.tar.xz"
source_dir_template = "mesa-{version}"
