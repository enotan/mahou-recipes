name = "wdisplays"
version = "1.1.1"
description = "Graphical display configuration tool for wlroots compositors"
source = "https://github.com/cyclopsian/wdisplays/archive/refs/tags/1.1.1.tar.gz"
sha256 = "2df2c56db494c8450b1c7746b0ed2af11bf637fe2838f7412146fcc5cc1a2605"
source_dir = "wdisplays-1.1.1"
deps = ["gtk+", "libepoxy", "meson", "ninja", "wayland", "wayland-protocols"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/cyclopsian/wdisplays/tags"
version_pattern = "/releases/tag/([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)"
source_template = "https://github.com/cyclopsian/wdisplays/archive/refs/tags/{version}.tar.gz"
source_dir_template = "wdisplays-{version}"
