name = "font-bh-ttf"
version = "1.0.4"
description = "Bigelow Holmes TrueType fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-bh-ttf-1.0.4.tar.xz"
sha256 = "85a5f90d00c48c2b06fd125ea8adbc8b8ee97429e3075081c8710926efec3a56"
source_dir = "font-bh-ttf-1.0.4"
deps = ["font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-bh-ttf-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-bh-ttf-{version}.tar.xz"
source_dir_template = "font-bh-ttf-{version}"
