name = "barcode"
version = "0.99"
description = "GNU barcode generation tool"
source = "https://ftp.gnu.org/gnu/barcode/barcode-0.99.tar.xz"
sha256 = "e87ecf6421573e17ce35879db8328617795258650831affd025fba42f155cdc6"
source_dir = "barcode-0.99"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-static",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/barcode/"
version_pattern = "barcode-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/barcode/barcode-{version}.tar.xz"
source_dir_template = "barcode-{version}"
