name = "python-mako"
version = "1.3.12"
description = "Python template library"
source = "https://files.pythonhosted.org/packages/source/M/Mako/mako-1.3.12.tar.gz"
sha256 = "9f778e93289bd410bb35daadeb4fc66d95a746f0b75777b942088b7fd7af550a"
source_dir = "mako-1.3.12"
deps = ["python", "python-markupsafe", "python-setuptools"]

build_steps = [
  "python3 setup.py build",
  "python3 setup.py install --root=${MAHOU_DESTDIR} --prefix=/usr --optimize=1",
]

[update]
check_url = "https://pypi.org/pypi/Mako/json"
version_pattern = "\"version\"\\s*:\\s*\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
source_template = "https://files.pythonhosted.org/packages/source/M/Mako/mako-{version}.tar.gz"
source_dir_template = "mako-{version}"
