name = "zlib-ng"
version = "2.3.3"
description = "Next generation zlib replacement with optimizations"
source = "https://github.com/zlib-ng/zlib-ng/archive/refs/tags/2.3.3.tar.gz"
sha256 = "f9c65aa9c852eb8255b636fd9f07ce1c406f061ec19a2e7d508b318ca0c907d1"
source_dir = "zlib-ng-2.3.3"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DWITH_GTEST=OFF -DZLIB_COMPAT=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/zlib-ng/zlib-ng/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/zlib-ng/zlib-ng/archive/refs/tags/{version}.tar.gz"
source_dir_template = "zlib-ng-{version}"
