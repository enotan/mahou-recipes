name = "zsh"
version = "5.9"
description = "Powerful interactive shell and scripting language"
source = "https://www.zsh.org/pub/zsh-5.9.tar.xz"
sha256 = "9b8d1ecedd5b5e81fbf1918e876752a7dd948e05c1a0dba10ab863842d45acd5"
source_dir = "zsh-5.9"
deps = ["gdbm", "ncurses", "pcre2"]

build_steps = [
  "./configure --prefix=/usr --enable-multibyte",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.zsh.org/pub/"
version_pattern = "zsh-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.xz"
source_template = "https://www.zsh.org/pub/zsh-{version}.tar.xz"
source_dir_template = "zsh-{version}"
