name = "catfish"
version = "4.20.1"
description = "File search utility for Xfce"
source = "https://archive.xfce.org/src/apps/catfish/4.20/catfish-4.20.1.tar.xz"
sha256 = "fe00d45b163cf86b4c85ebdd23a73d53aa55bc97ba3f691a248ec403d4ade62b"
