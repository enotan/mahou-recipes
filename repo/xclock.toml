name = "xclock"
version = "1.1.1"
description = "Analog and digital clock for X11"
source = "https://www.x.org/releases/individual/app/xclock-1.1.1.tar.xz"
sha256 = "df7ceabf8f07044a2fde4924d794554996811640a45de40cb12c2cf1f90f742c"
source_dir = "xclock-1.1.1"
deps = ["libX11", "libXmu", "libXaw", "libXft", "libXrender", "libxkbfile", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xclock-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xclock-{version}.tar.xz"
source_dir_template = "xclock-{version}"
