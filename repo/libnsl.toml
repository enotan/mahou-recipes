name = "libnsl"
version = "2.0.1"
description = "Public client interface for NIS services"
source = "https://github.com/thkukuk/libnsl/releases/download/v2.0.1/libnsl-2.0.1.tar.xz"
sha256 = "5c9e470b232a7acd3433491ac5221b4832f0c71318618dc6aa04dd05ffcd8fd9"
source_dir = "libnsl-2.0.1"
deps = ["libtirpc", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr --disable-static",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/thkukuk/libnsl/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/thkukuk/libnsl/releases/download/v{version}/libnsl-{version}.tar.xz"
source_dir_template = "libnsl-{version}"
