name = "isl"
version = "0.27"
description = "Integer set library for polyhedral compilation"
source = "https://libisl.sourceforge.io/isl-0.27.tar.xz"
sha256 = "6d8babb59e7b672e8cb7870e874f3f7b813b6e00e6af3f8b04f7579965643d5c"
source_dir = "isl-0.27"
deps = ["gmp"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --with-gmp=system",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://libisl.sourceforge.io/"
version_pattern = "isl-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://libisl.sourceforge.io/isl-{version}.tar.xz"
source_dir_template = "isl-{version}"
