name = "libXTrap"
version = "1.0.1"
description = "X Trap extension client library"
source = "https://www.x.org/releases/individual/lib/libXTrap-1.0.1.tar.gz"
sha256 = "db748e299dcc9af68428795b898a4a96cf806f79b75786781136503e4fce5e17"
source_dir = "libXTrap-1.0.1"
deps = ["libX11", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXTrap-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.x.org/releases/individual/lib/libXTrap-{version}.tar.gz"
source_dir_template = "libXTrap-{version}"
