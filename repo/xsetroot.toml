name = "xsetroot"
version = "1.1.3"
description = "Root window parameter setting utility for X"
source = "https://www.x.org/releases/individual/app/xsetroot-1.1.3.tar.xz"
sha256 = "6081b45a9eb4426e045d259d1e144b32417fb635e5b96aa90647365ac96638d1"
source_dir = "xsetroot-1.1.3"
deps = ["libX11", "libXcursor", "libXmu", "xbitmaps", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xsetroot-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xsetroot-{version}.tar.xz"
source_dir_template = "xsetroot-{version}"
