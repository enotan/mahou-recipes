name = "broot"
version = "1.56.4"
description = "Terminal file browser and launcher"
source = "https://github.com/Canop/broot/archive/refs/tags/v1.56.4.tar.gz"
sha256 = "ec49422f335965ee0338cd630869eb1fc6d974d43648bd483c802fd7e9aea99b"
source_dir = "broot-1.56.4"
deps = ["libgit2"]

build_steps = [
  "LIBGIT2_NO_VENDOR=1 cargo install --path . --locked --root ${MAHOU_DESTDIR}/usr",
  "rm -f ${MAHOU_DESTDIR}/usr/.crates.toml ${MAHOU_DESTDIR}/usr/.crates2.json",
]

[update]
check_url = "https://api.github.com/repos/Canop/broot/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/Canop/broot/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "broot-{version}"
