name = "xdg-desktop-portal"
version = "1.20.4"
description = "Portal frontend service for Flatpak and desktop sandboxes"
source = "https://github.com/flatpak/xdg-desktop-portal/releases/download/1.20.4/xdg-desktop-portal-1.20.4.tar.xz"
sha256 = "9528eb3b060b88ac82f294fbdc6af5f4d3adfa42575f2cd816cab3d3e0a7a68c"
source_dir = "xdg-desktop-portal-1.20.4"
deps = ["fuse3", "gdk-pixbuf", "glib", "gst-plugins-base", "json-glib", "pipewire"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dflatpak-interfaces=disabled -Dgeoclue=disabled -Dgudev=disabled -Dsystemd=disabled -Ddocumentation=disabled -Dtests=disabled -Dman-pages=disabled -Dsandboxed-image-validation=disabled -Dsandboxed-sound-validation=disabled",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/flatpak/xdg-desktop-portal/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/flatpak/xdg-desktop-portal/releases/download/{version}/xdg-desktop-portal-{version}.tar.xz"
source_dir_template = "xdg-desktop-portal-{version}"
