name = "libwacom"
version = "2.18.0"
description = "Library for identifying Wacom tablets and their model-specific features"
source = "https://github.com/linuxwacom/libwacom/releases/download/libwacom-2.18.0/libwacom-2.18.0.tar.xz"
sha256 = "7dbb9ab37df9df47ae2fdbb644916c986728291749bcd5ad8bcaa26f1e15f002"
source_dir = "libwacom-2.18.0"
deps = ["glib"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://api.github.com/repos/linuxwacom/libwacom/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"libwacom-([^\"]+)\""
source_template = "https://github.com/linuxwacom/libwacom/releases/download/libwacom-{version}/libwacom-{version}.tar.xz"
source_dir_template = "libwacom-{version}"
