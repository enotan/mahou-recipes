name = "scrypt"
version = "1.3.3"
description = "File encryption utility using the scrypt key derivation function"
source = "https://www.tarsnap.com/scrypt/scrypt-1.3.3.tgz"
sha256 = "1c2710517e998eaac2e97db11f092e37139e69886b21a1b2661f64e130215ae9"
source_dir = "scrypt-1.3.3"
deps = ["openssl"]
build_steps = [
    "./configure --prefix=/usr --enable-libscrypt-kdf",
    "make",
    "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.tarsnap.com/scrypt.html"
version_pattern = "scrypt-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tgz"
source_template = "https://www.tarsnap.com/scrypt/scrypt-{version}.tgz"
source_dir_template = "scrypt-{version}"
