name = "direvent"
version = "5.4"
description = "Daemon for monitoring directory events"
source = "https://ftp.gnu.org/gnu/direvent/direvent-5.4.tar.gz"
sha256 = "1dbbc6192aab67e345725148603d570c6a2828380c964215762af91524d795ba"
source_dir = "direvent-5.4"
deps = ["gettext"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/direvent/"
version_pattern = "direvent-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/direvent/direvent-{version}.tar.gz"
source_dir_template = "direvent-{version}"
