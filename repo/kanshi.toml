name = "kanshi"
version = "1.9.0"
description = "dynamic display configuration (autorandr for wayland)"
source = "https://gitlab.freedesktop.org/emersion/kanshi/-/releases/v1.9.0/downloads/kanshi-1.9.0.tar.gz"
sha256 = "d5dfdaa7fe65d7105fc0ea4b0d7b7bf6a28b4d39c664e31722000bc9afa61108"
source_dir = "kanshi-1.9.0"
deps = ["wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://gitlab.freedesktop.org/emersion/kanshi/-/releases"
version_pattern = "kanshi-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://gitlab.freedesktop.org/emersion/kanshi/-/releases/v{version}/downloads/kanshi-{version}.tar.gz"
source_dir_template = "kanshi-{version}"
