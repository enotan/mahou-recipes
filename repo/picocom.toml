name = "picocom"
version = "3.1"
description = "Minimal dumb-terminal emulation program"
source = "https://github.com/npat-efault/picocom/archive/refs/tags/3.1.tar.gz"
sha256 = "e6761ca932ffc6d09bd6b11ff018bdaf70b287ce518b3282d29e0270e88420bb"
source_dir = "picocom-3.1"
deps = []

build_steps = [
  "make",
  "install -Dm755 picocom ${MAHOU_DESTDIR}/usr/bin/picocom",
  "install -Dm644 picocom.1 ${MAHOU_DESTDIR}/usr/share/man/man1/picocom.1",
]

[update]
check_url = "https://api.github.com/repos/npat-efault/picocom/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/npat-efault/picocom/archive/refs/tags/{version}.tar.gz"
source_dir_template = "picocom-{version}"
