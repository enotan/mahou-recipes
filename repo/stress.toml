name = "stress"
version = "1.0.7"
description = "Simple workload generator for POSIX systems"
source = "https://github.com/resurrecting-open-source-projects/stress/archive/refs/tags/1.0.7.tar.gz"
sha256 = "cdaa56671506133e2ed8e1e318d793c2a21c4a00adc53f31ffdef1ece8ace0b1"
source_dir = "stress-1.0.7"
deps = ["autoconf", "automake"]

build_steps = [
  "./autogen.sh",
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/resurrecting-open-source-projects/stress/tags"
version_pattern = "\"name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/resurrecting-open-source-projects/stress/archive/refs/tags/{version}.tar.gz"
source_dir_template = "stress-{version}"
