name = "libfontenc"
version = "1.1.9"
description = "X11 font encoding library"
source = "https://www.x.org/releases/individual/lib/libfontenc-1.1.9.tar.xz"
sha256 = "9d8392705cb10803d5fe1d27d236cbab3f664e26841ce01916bbbe430cf273e2"
source_dir = "libfontenc-1.1.9"
deps = ["zlib", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libfontenc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libfontenc-{version}.tar.xz"
source_dir_template = "libfontenc-{version}"
