name = "libtool"
version = "2.6.0"
description = "A shared library tool for developers"
source = "https://alpha.gnu.org/gnu/libtool/libtool-2.6.0.tar.xz"
sha256 = "69e6d28ae880fda08e0dc080ef2e38077ea2765a0d84e1afcfcfe1e605c911ac"
source_dir = "libtool-2.6.0"
deps = ["m4"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://alpha.gnu.org/gnu/libtool/"
version_pattern = "libtool-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
