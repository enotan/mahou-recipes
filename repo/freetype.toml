name = "freetype"
version = "2.14.3"
description = "Font rendering library"
source = "https://download.savannah.gnu.org/releases/freetype/freetype-2.14.3.tar.xz"
sha256 = "36bc4f1cc413335368ee656c42afca65c5a3987e8768cc28cf11ba775e785a5f"
deps = ["zlib", "libpng"]
source_dir = "freetype-2.14.3"
build_steps = [
    "./configure --prefix=/usr",
    "make",
    "make DESTDIR=${MAHOU_DESTDIR} install"
]

[update]
check_url = "https://download.savannah.gnu.org/releases/freetype/"
version_pattern = "freetype-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.savannah.gnu.org/releases/freetype/freetype-{version}.tar.xz"
source_dir_template = "freetype-{version}"
