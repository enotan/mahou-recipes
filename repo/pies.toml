name = "pies"
version = "1.9"
description = "Program invocation and execution supervisor"
source = "https://ftp.gnu.org/gnu/pies/pies-1.9.tar.gz"
sha256 = "425ad6c961eb77cd777c99846f23fbcf603e7a9a92d9e002e8e4332d82de3dea"
source_dir = "pies-1.9"
deps = ["gettext"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var --disable-pam --disable-inetd --disable-sysvinit",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/pies/"
version_pattern = "pies-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/pies/pies-{version}.tar.gz"
source_dir_template = "pies-{version}"
