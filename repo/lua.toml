name = "lua"
version = "5.5.0"
description = "Lightweight embeddable scripting language"
source = "https://www.lua.org/ftp/lua-5.5.0.tar.gz"
sha256 = "57ccc32bbbd005cab75bcc52444052535af691789dba2b9016d5c50640d68b3d"
source_dir = "lua-5.5.0"
deps = ["readline"]

build_steps = [
  "make linux-readline",
  "make INSTALL_TOP=${MAHOU_DESTDIR}/usr INSTALL_MAN=${MAHOU_DESTDIR}/usr/share/man/man1 install",
]

[update]
check_url = "https://www.lua.org/ftp/"
version_pattern = "lua-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.lua.org/ftp/lua-{version}.tar.gz"
source_dir_template = "lua-{version}"
