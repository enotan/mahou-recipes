name = "trueprint"
version = "5.4"
description = "Pretty-printer for source code"
source = "https://ftp.gnu.org/gnu/trueprint/trueprint-5.4.tar.gz"
sha256 = "104be483905f4f4dc4b5d475389b72b6d95f12b62d796f8af31d04f51c60338f"
source_dir = "trueprint-5.4"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/trueprint/"
version_pattern = "trueprint-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/trueprint/trueprint-{version}.tar.gz"
source_dir_template = "trueprint-{version}"
