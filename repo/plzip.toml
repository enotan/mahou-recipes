name = "plzip"
version = "1.13"
description = "Massively parallel lzip compressor and decompressor"
source = "https://download.savannah.gnu.org/releases/lzip/plzip/plzip-1.13.tar.gz"
sha256 = "64d49dde20daa5fdff2b3ff28e3348082de10dd54eb10df6da7d1bc6c7a6db64"
source_dir = "plzip-1.13"
deps = ["lzlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://download.savannah.gnu.org/releases/lzip/plzip/"
version_pattern = "plzip-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://download.savannah.gnu.org/releases/lzip/plzip/plzip-{version}.tar.gz"
source_dir_template = "plzip-{version}"
