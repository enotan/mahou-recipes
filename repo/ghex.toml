name = "ghex"
version = "50.1"
description = "GNOME hex editor"
source = "https://download.gnome.org/sources/ghex/50/ghex-50.1.tar.xz"
sha256 = "eb270b35b41b8f78a830ec83e1b89b7caeabed032922035b9e129edd95598178"
source_dir = "ghex-50.1"
deps = ["glib", "gtk4", "libadwaita"]
build_steps = ["meson setup build --prefix=/usr --buildtype=release", "ninja -C build", "DESTDIR=${MAHOU_DESTDIR} ninja -C build install"]

[update]
check_url = "https://download.gnome.org/sources/ghex/50/"
version_pattern = "ghex-([^\"/]+)\\.tar\\.xz"
