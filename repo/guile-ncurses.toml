name = "guile-ncurses"
version = "3.1"
description = "Ncurses bindings for GNU Guile"
source = "https://ftp.gnu.org/gnu/guile-ncurses/guile-ncurses-3.1.tar.gz"
sha256 = "ee89e8ceafcab9dd0ef3fc1acc9b10f4d21ba4b256d329d842d6183e63f8d733"
source_dir = "guile-ncurses-3.1"
deps = ["guile", "ncurses"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/guile-ncurses/"
version_pattern = "guile-ncurses-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/guile-ncurses/guile-ncurses-{version}.tar.gz"
source_dir_template = "guile-ncurses-{version}"
