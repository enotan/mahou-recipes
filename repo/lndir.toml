name = "lndir"
version = "1.0.5"
description = "Create a shadow directory of symbolic links"
source = "https://www.x.org/releases/individual/util/lndir-1.0.5.tar.xz"
sha256 = "3b65577a5575cce095664f5492164a96941800fe6290a123731d47f3e7104ddb"
source_dir = "lndir-1.0.5"
deps = ["xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/util/"
version_pattern = "lndir-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/util/lndir-{version}.tar.xz"
source_dir_template = "lndir-{version}"
