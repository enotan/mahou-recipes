name = "gnushogi"
version = "1.4.2"
description = "GNU Shogi game engine"
source = "https://ftp.gnu.org/gnu/gnushogi/gnushogi-1.4.2.tar.gz"
sha256 = "1ecc48a866303c63652552b325d685e7ef5e9893244080291a61d96505d52b29"
source_dir = "gnushogi-1.4.2"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gnushogi/"
version_pattern = "gnushogi-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/gnushogi/gnushogi-{version}.tar.gz"
source_dir_template = "gnushogi-{version}"
