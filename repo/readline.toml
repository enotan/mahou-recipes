name = "readline"
version = "8.3"
description = "Library for interactive line editing"
source = "https://ftpmirror.gnu.org/readline/readline-8.3.tar.gz"
sha256 = "fe5383204467828cd495ee8d1d3c037a7eba1389c22bc6a041f627976f9061cc"
source_dir = "readline-8.3"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr --disable-static",
  "make SHLIB_LIBS='-lncursesw'",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/readline/"
version_pattern = "readline-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftpmirror.gnu.org/readline/readline-{version}.tar.gz"
source_dir_template = "readline-{version}"
