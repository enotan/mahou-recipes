name = "magic_enum"
version = "0.9.8"
description = "Static reflection for C++ enums"
source = "https://github.com/Neargye/magic_enum/archive/refs/tags/v0.9.8.tar.gz"
sha256 = "1e54959a3f3cb675938d858603ad69d0f3f7c82439fc2bf86d7232daec2bd10e"
source_dir = "magic_enum-0.9.8"
deps = ["cmake"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DMAGIC_ENUM_OPT_BUILD_EXAMPLES=OFF -DMAGIC_ENUM_OPT_BUILD_TESTS=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/Neargye/magic_enum/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/Neargye/magic_enum/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "magic_enum-{version}"
