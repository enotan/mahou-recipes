name = "fdupes"
version = "2.4.0"
description = "Find duplicate files"
source = "https://github.com/adrianlopezroche/fdupes/archive/refs/tags/v2.4.0.tar.gz"
sha256 = "2a11250ef0e9d82837dcf336853b2891732cc78e2888ccdc6b689ab7b47b0f5b"
source_dir = "fdupes-2.4.0"
deps = ["autoconf", "automake", "ncurses", "pcre2"]

build_steps = [
  "autoreconf -fi",
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/adrianlopezroche/fdupes/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/adrianlopezroche/fdupes/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "fdupes-{version}"
