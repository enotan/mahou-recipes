name = "mahou"
version = "0.1.0"
description = "A witch's favourite package manager."
source = "https://github.com/enotan/mahou/archive/refs/tags/v0.1.0.tar.gz"
sha256 = "f18bf98cbfd6019345675fbd446cf1797b67c70fc1314183e4709e9b875cae91"
source_dir = "mahou-0.1.0"
deps = []

build_steps = [
  "cargo build --release --bins",
  "install -Dm755 target/release/mahou ${MAHOU_DESTDIR}/usr/bin/mahou",
  "install -Dm755 target/release/kakera ${MAHOU_DESTDIR}/usr/bin/kakera",
]

[update]
check_url = "https://github.com/enotan/mahou/tags"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/enotan/mahou/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "mahou-{version}"
