name = "wavpack"
version = "5.9.0"
description = "Hybrid lossless audio compression"
source = "https://github.com/dbry/WavPack/archive/refs/tags/5.9.0.tar.gz"
sha256 = "2a53e50aefd8c9f04a0828a0e1ef77b6f4c17b0ef6964ad234ab295f313b7d6d"
source_dir = "WavPack-5.9.0"
