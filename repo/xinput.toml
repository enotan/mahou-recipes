name = "xinput"
version = "1.6.4"
description = "Utility to configure and test X input devices"
source = "https://www.x.org/releases/individual/app/xinput-1.6.4.tar.xz"
sha256 = "ad04d00d656884d133110eeddc34e9c69e626ebebbbab04dc95791c2907057c8"
source_dir = "xinput-1.6.4"
deps = ["libX11", "libXi"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xinput-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xinput-{version}.tar.xz"
source_dir_template = "xinput-{version}"
