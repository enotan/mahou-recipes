name = "mpv"
version = "0.41.0"
description = "Media player based on FFmpeg"
source = "https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz"
sha256 = "ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209"
source_dir = "mpv-0.41.0"
deps = ["ffmpeg", "libass", "libplacebo", "libxkbcommon", "luajit", "zlib"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dlua=luajit -Djavascript=disabled -Dcdda=disabled -Ddvdnav=disabled -Dlibbluray=disabled -Drubberband=disabled -Dzimg=disabled -Dx11=disabled -Dvulkan=disabled -Dgl=disabled -Degl=disabled -Dvaapi=disabled -Dvdpau=disabled -Dmanpage-build=disabled {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.alsa]
deps = ["alsa-lib"]
build_flags = ["-Dalsa=enabled"]
disabled_build_flags = ["-Dalsa=disabled"]

[features.archive]
deps = ["libarchive"]
build_flags = ["-Dlibarchive=enabled"]
disabled_build_flags = ["-Dlibarchive=disabled"]

[features.drm]
deps = ["libdrm"]
build_flags = ["-Ddrm=enabled"]
disabled_build_flags = ["-Ddrm=disabled"]

[features.pipewire]
deps = ["pipewire"]
build_flags = ["-Dpipewire=enabled"]
disabled_build_flags = ["-Dpipewire=disabled"]

[features.pulseaudio]
deps = ["pulseaudio"]
build_flags = ["-Dpulse=enabled"]
disabled_build_flags = ["-Dpulse=disabled"]

[features.uchardet]
deps = ["uchardet"]
build_flags = ["-Duchardet=enabled"]
disabled_build_flags = ["-Duchardet=disabled"]

[features.wayland]
deps = ["wayland", "wayland-protocols"]
build_flags = ["-Dwayland=enabled"]
disabled_build_flags = ["-Dwayland=disabled"]

[update]
check_url = "https://github.com/mpv-player/mpv/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/mpv-player/mpv/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "mpv-{version}"
