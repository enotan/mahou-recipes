name = "imlib2"
version = "1.12.6"
description = "Image loading, saving, rendering, and manipulation library"
source = "https://downloads.sourceforge.net/project/enlightenment/imlib2-src/1.12.6/imlib2-1.12.6.tar.xz"
sha256 = "250f9752f69dc522e529a81aaa9395705f7fc312ff2453e5de59ac2ba1f2858f"
source_dir = "imlib2-1.12.6"
deps = ["bzip2", "freetype", "giflib", "libjxl", "libraw", "libwebp", "libX11", "libXext", "libjpeg-turbo", "libpng", "tiff", "xz", "zlib"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --with-x --without-avif --without-heif --without-j2k --without-ps --without-svg --without-y4m --without-id3 --without-x-shm-fd",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://sourceforge.net/projects/enlightenment/files/imlib2-src/"
version_pattern = "imlib2-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://downloads.sourceforge.net/project/enlightenment/imlib2-src/{version}/imlib2-{version}.tar.xz"
source_dir_template = "imlib2-{version}"
