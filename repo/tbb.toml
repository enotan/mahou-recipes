name = "tbb"
version = "2023.0.0"
description = "oneAPI Threading Building Blocks"
source = "https://github.com/oneapi-src/oneTBB/archive/refs/tags/v2023.0.0.tar.gz"
sha256 = "f8767b971ec6aea25dde58ae0f593e94e7aa75a739a86f67967012f69e2199b1"
source_dir = "oneTBB-2023.0.0"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DTBB_TEST=OFF -DTBB_EXAMPLES=OFF -DTBB_STRICT=OFF -DTBB_DISABLE_HWLOC_AUTOMATIC_SEARCH=ON",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/oneapi-src/oneTBB/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/oneapi-src/oneTBB/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "oneTBB-{version}"
