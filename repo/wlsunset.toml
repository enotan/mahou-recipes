name = "wlsunset"
version = "0.4.0"
description = "Day/night gamma adjustments for Wayland compositors"
source = "https://git.sr.ht/~kennylevinsen/wlsunset/archive/0.4.0.tar.gz"
sha256 = "a86ffb1793fe622802ec25795b69df864715986ecc175f7734e739c9e264ed72"
source_dir = "wlsunset-0.4.0"
deps = ["wayland", "wayland-protocols"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dman-pages=disabled",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://git.sr.ht/~kennylevinsen/wlsunset/refs"
version_pattern = "refs/([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://git.sr.ht/~kennylevinsen/wlsunset/archive/{version}.tar.gz"
source_dir_template = "wlsunset-{version}"
