name = "font-ibm-type1"
version = "1.0.4"
description = "IBM Type1 fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-ibm-type1-1.0.4.tar.xz"
sha256 = "c4395e95ba46d40c4ad1737e91cac20c0ab75411329b60db5d99fed92b60ce7f"
source_dir = "font-ibm-type1-1.0.4"
deps = ["font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-ibm-type1-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-ibm-type1-{version}.tar.xz"
source_dir_template = "font-ibm-type1-{version}"
