name = "libnftnl"
version = "1.3.1"
description = "Low-level userspace library for the nf_tables subsystem"
source = "https://www.netfilter.org/pub/libnftnl/libnftnl-1.3.1.tar.xz"
sha256 = "607da28dba66fbdeccf8ef1395dded9077e8d19f2995f9a4d45a9c2f0bcffba8"
source_dir = "libnftnl-1.3.1"
deps = ["libmnl"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://git.netfilter.org/libnftnl/refs/tags"
version_pattern = "libnftnl-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://www.netfilter.org/pub/libnftnl/libnftnl-{version}.tar.xz"
source_dir_template = "libnftnl-{version}"
