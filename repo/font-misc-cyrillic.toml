name = "font-misc-cyrillic"
version = "1.0.4"
description = "Miscellaneous Cyrillic bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-misc-cyrillic-1.0.4.tar.xz"
sha256 = "76021a7f53064001914a57fd08efae57f76b68f0a24dca8ab1b245474ee8e993"
source_dir = "font-misc-cyrillic-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-misc-cyrillic-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-misc-cyrillic-{version}.tar.xz"
source_dir_template = "font-misc-cyrillic-{version}"
