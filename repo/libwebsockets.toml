name = "libwebsockets"
version = "4.5.8"
description = "Lightweight C websockets library"
source = "https://github.com/warmcat/libwebsockets/archive/refs/tags/v4.5.8.tar.gz"
sha256 = "b6ade658f4af3a823d0dc806ae5ef0623f0f4f5e2aeb895a0f77c4783840c30e"
source_dir = "libwebsockets-4.5.8"
deps = ["cmake", "openssl", "zlib"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DLWS_WITH_SHARED=ON -DLWS_WITH_STATIC=OFF -DLWS_WITH_SSL=ON -DLWS_WITH_ZLIB=ON -DLWS_WITHOUT_TESTAPPS=ON -DLWS_WITH_MINIMAL_EXAMPLES=OFF -DLWS_WITH_LIBCAP=OFF -DLWS_WITH_PLUGINS=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/warmcat/libwebsockets/tags"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/warmcat/libwebsockets/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "libwebsockets-{version}"
