name = "slang"
version = "2.3.3"
description = "S-Lang programming library"
source = "https://www.jedsoft.org/releases/slang/slang-2.3.3.tar.bz2"
sha256 = "f9145054ae131973c61208ea82486d5dd10e3c5cdad23b7c4a0617743c8f5a18"
source_dir = "slang-2.3.3"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr --without-pcre --without-png --without-z",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.jedsoft.org/releases/slang/"
version_pattern = "slang-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://www.jedsoft.org/releases/slang/slang-{version}.tar.bz2"
source_dir_template = "slang-{version}"
