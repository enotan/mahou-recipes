name = "jq"
version = "1.8.1"
description = "Lightweight and flexible command-line JSON processor"
source = "https://github.com/jqlang/jq/archive/refs/tags/jq-1.8.1.tar.gz"
sha256 = "51c4ec0913281d917f22a823d1ddcf17c9bc2be845fac987d5fe1d3ae78dd6a2"
source_dir = "jq-jq-1.8.1"
deps = ["autoconf", "automake", "libtool"]

build_steps = [
  "autoreconf -fi",
  "./configure --prefix=/usr --disable-docs {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.oniguruma]
deps = ["oniguruma"]
build_flags = ["--with-oniguruma=/usr"]
disabled_build_flags = ["--without-oniguruma"]

[update]
check_url = "https://github.com/jqlang/jq/releases"
version_pattern = "/releases/tag/jq-([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/jqlang/jq/archive/refs/tags/jq-{version}.tar.gz"
source_dir_template = "jq-jq-{version}"
