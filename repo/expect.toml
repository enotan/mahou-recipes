name = "expect"
version = "5.45.4"
description = "Automates interactive applications through Tcl scripts"
source = "https://downloads.sourceforge.net/project/expect/Expect/5.45.4/expect5.45.4.tar.gz"
sha256 = "49a7da83b0bdd9f46d04a04deec19c7767bb9a323e40c4781f89caf760b92c34"
source_dir = "expect5.45.4"
deps = ["tcl"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --enable-shared --enable-threads --with-tcl=/usr/lib --with-tclinclude=/usr/include",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://sourceforge.net/projects/expect/files/Expect/"
version_pattern = "/Expect/([0-9]+\\.[0-9]+\\.[0-9]+)/"
source_template = "https://downloads.sourceforge.net/project/expect/Expect/{version}/expect{version}.tar.gz"
source_dir_template = "expect{version}"
