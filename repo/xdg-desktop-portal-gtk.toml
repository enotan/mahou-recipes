name = "xdg-desktop-portal-gtk"
version = "1.15.3"
description = "GTK backend for xdg-desktop-portal"
source = "https://github.com/flatpak/xdg-desktop-portal-gtk/releases/download/1.15.3/xdg-desktop-portal-gtk-1.15.3.tar.xz"
sha256 = "47a3743d2419a8601e691db37e85bb5fac5ae4b26842177065cd5f22ada23b37"
source_dir = "xdg-desktop-portal-gtk-1.15.3"
deps = ["glib", "gtk+", "xdg-desktop-portal"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/flatpak/xdg-desktop-portal-gtk/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/flatpak/xdg-desktop-portal-gtk/releases/download/{version}/xdg-desktop-portal-gtk-{version}.tar.xz"
source_dir_template = "xdg-desktop-portal-gtk-{version}"
