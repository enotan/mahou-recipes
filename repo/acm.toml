name = "acm"
version = "5.1"
description = "Aerial combat simulator for X11"
source = "https://ftp.gnu.org/gnu/acm/acm-5.1.tar.gz"
sha256 = "01efbf11a1c23f0b896532f8f8c5cbcb9ca1a655fa6b06919f9664b8c32ea687"
source_dir = "acm-5.1"
deps = ["libX11", "libXext", "xorg-proto"]
build_steps = ["./configure --prefix=/usr", "make", "make DESTDIR=${MAHOU_DESTDIR} install"]
[update]
check_url = "https://ftp.gnu.org/gnu/acm/"
version_pattern = "acm-([0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/acm/acm-{version}.tar.gz"
source_dir_template = "acm-{version}"
