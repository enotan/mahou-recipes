name = "font-adobe-utopia-75dpi"
version = "1.0.5"
description = "Adobe Utopia 75 DPI bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-adobe-utopia-75dpi-1.0.5.tar.xz"
sha256 = "a726245932d0724fa0c538c992811d63d597e5f53928f4048e9caf5623797760"
source_dir = "font-adobe-utopia-75dpi-1.0.5"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-adobe-utopia-75dpi-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-adobe-utopia-75dpi-{version}.tar.xz"
source_dir_template = "font-adobe-utopia-75dpi-{version}"
