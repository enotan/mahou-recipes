name = "glog"
version = "0.7.1"
description = "C++ logging library"
source = "https://github.com/google/glog/archive/refs/tags/v0.7.1.tar.gz"
sha256 = "00e4a87e87b7e7612f519a41e491f16623b12423620006f59f5688bfd8d13b08"
source_dir = "glog-0.7.1"
deps = ["cmake", "gflags"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF -DWITH_GFLAGS=ON -DWITH_GTEST=OFF -DWITH_PKGCONFIG=ON -DWITH_UNWIND=none",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/google/glog/releases"
version_pattern = "/releases/tag/v?([0-9][^\"/-]*)"
source_template = "https://github.com/google/glog/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "glog-{version}"
