name = "coreutils"
version = "9.9"
description = "GNU core utilities"
source = "https://ftpmirror.gnu.org/coreutils/coreutils-9.9.tar.xz"
sha256 = "19bcb6ca867183c57d77155eae946c5eced88183143b45ca51ad7d26c628ca75"
source_dir = "coreutils-9.9"
deps = ["acl", "attr", "gmp", "openssl"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/coreutils/"
version_pattern = "coreutils-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftpmirror.gnu.org/coreutils/coreutils-{version}.tar.xz"
source_dir_template = "coreutils-{version}"
