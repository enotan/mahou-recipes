name = "gnupg"
version = "2.5.20"
description = "GNU Privacy Guard encryption and signing suite"
source = "https://www.gnupg.org/ftp/gcrypt/gnupg/gnupg-2.5.20.tar.bz2"
sha256 = "6461266e99c308419a379abe6c356d54c214136c4589bd65951091138989ffc6"
source_dir = "gnupg-2.5.20"
deps = ["bzip2", "libassuan", "libgcrypt", "libgpg-error", "libksba", "npth", "readline", "zlib"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.gnupg.org/ftp/gcrypt/gnupg/"
version_pattern = "gnupg-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.bz2"
source_template = "https://www.gnupg.org/ftp/gcrypt/gnupg/gnupg-{version}.tar.bz2"
source_dir_template = "gnupg-{version}"
