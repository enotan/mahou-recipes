name = "font-jis-misc"
version = "1.0.4"
description = "JIS miscellaneous bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-jis-misc-1.0.4.tar.xz"
sha256 = "78d1eff6c471f7aa6802a26d62cccf51d8e5185586406d9b6e1ee691b0bffad0"
source_dir = "font-jis-misc-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-jis-misc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-jis-misc-{version}.tar.xz"
source_dir_template = "font-jis-misc-{version}"
