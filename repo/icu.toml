name = "icu"
version = "78.3"
description = "International Components for Unicode"
source = "https://github.com/unicode-org/icu/releases/download/release-78.3/icu4c-78.3-sources.tgz"
sha256 = "3a2e7a47604ba702f345878308e6fefeca612ee895cf4a5f222e7955fabfe0c0"
source_dir = "icu/source"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-samples --disable-tests",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/unicode-org/icu/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"release-([^\"]+)\""
source_template = "https://github.com/unicode-org/icu/releases/download/release-{version}/icu4c-{version}-sources.tgz"
source_dir_template = "icu/source"
