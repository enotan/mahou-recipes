name = "advancecomp"
version = "2.6"
description = "Recompression utilities for ZIP, PNG, MNG, and GZ files"
source = "https://github.com/amadvance/advancecomp/releases/download/v2.6/advancecomp-2.6.tar.gz"
sha256 = "b07d77735540409771cbe1b6df165b5151c11bb9c3d8f01290be0ec88ec3498f"
source_dir = "advancecomp-2.6"
deps = ["bzip2", "zlib"]

build_steps = [
  "./configure --prefix=/usr --enable-bzip2",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://github.com/amadvance/advancecomp/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/amadvance/advancecomp/releases/download/v{version}/advancecomp-{version}.tar.gz"
source_dir_template = "advancecomp-{version}"
