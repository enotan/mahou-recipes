name = "lapack"
version = "3.12.1"
description = "Reference implementation of LAPACK linear algebra routines"
source = "https://github.com/Reference-LAPACK/lapack/archive/refs/tags/v3.12.1.tar.gz"
sha256 = "2ca6407a001a474d4d4d35f3a61550156050c48016d949f0da0529c0aa052422"
source_dir = "lapack-3.12.1"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF -DC_LAPACK=ON -DCBLAS=ON -DLAPACKE=ON",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/Reference-LAPACK/lapack/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/Reference-LAPACK/lapack/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "lapack-{version}"
