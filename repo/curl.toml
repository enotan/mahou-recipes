name = "curl"
version = "8.19.0"
description = "A Client that groks URLs"
source = "https://curl.se/download/curl-8.19.0.tar.xz"
sha256 = "4eb41489790d19e190d7ac7e18e82857cdd68af8f4e66b292ced562d333f11df"
source_dir = "curl-8.19.0"
deps = ["openssl", "zlib", "nghttp2"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://curl.se/download/"
version_pattern = "curl-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://curl.se/download/curl-{version}.tar.xz"
source_dir_template = "curl-{version}"
