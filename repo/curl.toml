name = "curl"
version = "8.21.0"
description = "A Client that groks URLs"
source = "https://curl.se/download/curl-8.21.0.tar.xz"
sha256 = "aa1b66a70eace83dc624508745646c08ae561de512ab403adffb93ac87fc72e6"
source_dir = "curl-8.21.0"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-docs --disable-manual --disable-ldap --disable-ldaps --without-brotli --without-gnutls --without-libgsasl --without-libssh --without-ldap --without-ngtcp2 --without-nghttp3 --without-quiche --without-libuv {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.async-dns]
deps = ["c-ares"]
build_flags = ["--enable-ares"]
disabled_build_flags = ["--disable-ares"]

[features.http2]
deps = ["nghttp2"]
build_flags = ["--with-nghttp2"]
disabled_build_flags = ["--without-nghttp2"]

[features.idn]
deps = ["libidn2"]
build_flags = ["--with-libidn2"]
disabled_build_flags = ["--without-libidn2"]

[features.libpsl]
deps = ["libpsl"]
build_flags = ["--with-libpsl"]
disabled_build_flags = ["--without-libpsl"]

[features.ssh]
deps = ["libssh2"]
build_flags = ["--with-libssh2"]
disabled_build_flags = ["--without-libssh2"]

[features.ssl]
deps = ["openssl"]
build_flags = ["--with-openssl"]
disabled_build_flags = ["--without-ssl"]

[features.zlib]
deps = ["zlib"]
build_flags = ["--with-zlib"]
disabled_build_flags = ["--without-zlib"]

[features.zstd]
deps = ["zstd"]
build_flags = ["--with-zstd"]
disabled_build_flags = ["--without-zstd"]

[update]
check_url = "https://curl.se/download/"
version_pattern = "curl-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://curl.se/download/curl-{version}.tar.xz"
source_dir_template = "curl-{version}"
