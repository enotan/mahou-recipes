name = "libxml2"
version = "2.15.3"
description = "XML C parser and toolkit"
source = "https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.3.tar.xz"
sha256 = "78262a6e7ac170d6528ebfe2efccdf220191a5af6a6cd61ea4a9a9a5042c7a07"
source_dir = "libxml2-2.15.3"
deps = ["zlib", "xz"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://download.gnome.org/sources/libxml2/2.15/"
version_pattern = "libxml2-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/libxml2/2.15/libxml2-{version}.tar.xz"
source_dir_template = "libxml2-{version}"
