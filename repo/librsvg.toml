name = "librsvg"
version = "2.62.3"
description = "SVG rendering library"
source = "https://download.gnome.org/sources/librsvg/2.62/librsvg-2.62.3.tar.xz"
sha256 = "7eb449b2722a768021356f66dfee3202c229b54ed4e6a70ce40c090e97ff16f2"
source_dir = "librsvg-2.62.3"
deps = ["cairo", "cargo-c", "freetype", "glib", "harfbuzz", "libxml2", "meson", "ninja", "pango", "pkgconf", "rust-bin"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Ddocs=disabled -Dtests=false {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.avif]
deps = ["dav1d"]
build_flags = ["-Davif=enabled"]
disabled_build_flags = ["-Davif=disabled"]

[features.introspection]
deps = ["gobject-introspection"]
build_flags = ["-Dintrospection=enabled"]
disabled_build_flags = ["-Dintrospection=disabled"]

[features.pixbuf]
deps = ["gdk-pixbuf"]
build_flags = ["-Dpixbuf=enabled"]
disabled_build_flags = ["-Dpixbuf=disabled"]

[features.pixbuf-loader]
deps = ["gdk-pixbuf"]
build_flags = ["-Dpixbuf=enabled", "-Dpixbuf-loader=enabled"]
disabled_build_flags = ["-Dpixbuf-loader=disabled"]

[features.vala]
deps = ["gobject-introspection", "vala"]
build_flags = ["-Dvala=enabled"]
disabled_build_flags = ["-Dvala=disabled"]

[update]
check_url = "https://download.gnome.org/sources/librsvg/2.62/"
version_pattern = "librsvg-(2\\.62\\.(?:[0-9]|[1-8][0-9]))\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/librsvg/2.62/librsvg-{version}.tar.xz"
source_dir_template = "librsvg-{version}"
