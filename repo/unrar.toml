name = "unrar"
version = "7.2.4"
description = "RAR archive extractor"
source = "https://www.rarlab.com/rar/unrarsrc-7.2.4.tar.gz"
sha256 = "b02e571a33af7711cd803080500370dc1d28eea82b2032480819d27462ad8b31"
source_dir = "unrar"
deps = []

build_steps = [
  "make -f makefile",
  "install -Dm755 unrar ${MAHOU_DESTDIR}/usr/bin/unrar",
  "install -Dm644 license.txt ${MAHOU_DESTDIR}/usr/share/licenses/unrar/license.txt",
  "install -Dm644 readme.txt ${MAHOU_DESTDIR}/usr/share/doc/unrar/readme.txt",
]

[update]
check_url = "https://www.rarlab.com/rar/"
version_pattern = "unrarsrc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://www.rarlab.com/rar/unrarsrc-{version}.tar.gz"
source_dir_template = "unrar"
