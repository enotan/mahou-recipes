name = "spirv-tools"
version = "1.4.350.1"
description = "API and commands for processing SPIR-V modules"
source = "https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-1.4.350.1.tar.gz"
sha256 = "6f7b9b9eed9a7aa485918466ea604b4edc7969d94e96c0c13ae266f4ec120f31"
source_dir = "SPIRV-Tools-vulkan-sdk-1.4.350.1"
deps = ["cmake", "spirv-headers"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DSPIRV-Headers_SOURCE_DIR=/usr -DSPIRV_SKIP_TESTS=ON -DSPIRV_WERROR=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/KhronosGroup/SPIRV-Tools/tags"
version_pattern = "vulkan-sdk-([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-{version}.tar.gz"
source_dir_template = "SPIRV-Tools-vulkan-sdk-{version}"
