name = "lib32-zlib"
version = "1.3.2"
description = "Standard compression library (32-bit)"
source = "https://zlib.net/zlib-1.3.2.tar.xz"
sha256 = "d7a0654783a4da529d1bb793b7ad9c3318020af77667bcae35f95d0e42a792f3"
source_dir = "zlib-1.3.2"
deps = []

build_steps = [
  "make distclean || true",
  "CFLAGS='-m32 -O2' LDFLAGS='-m32' ./configure --prefix=/usr --libdir=/usr/lib32",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://zlib.net/"
version_pattern = "zlib-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://zlib.net/zlib-{version}.tar.xz"
source_dir_template = "zlib-{version}"
