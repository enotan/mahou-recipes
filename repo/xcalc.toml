name = "xcalc"
version = "1.1.3"
description = "Scientific calculator for X11"
source = "https://www.x.org/releases/individual/app/xcalc-1.1.3.tar.xz"
sha256 = "86e157b6174678675a4a912995dccd0ff4e2ce32b01bdd6f91bfe93333324980"
source_dir = "xcalc-1.1.3"
deps = ["libX11", "libXt", "libXaw", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xcalc-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xcalc-{version}.tar.xz"
source_dir_template = "xcalc-{version}"
