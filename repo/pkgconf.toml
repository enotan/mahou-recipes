name = "pkgconf"
version = "2.5.1"
description = "pkg-config compatible replacement with no dependencies other than C99"
source = "https://distfiles.ariadne.space/pkgconf/pkgconf-2.5.1.tar.xz"
sha256 = "cd05c9589b9f86ecf044c10a2269822bc9eb001eced2582cfffd658b0a50c243"
source_dir = "pkgconf-2.5.1"
deps = []

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://distfiles.ariadne.space/pkgconf/"
version_pattern = "pkgconf-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://distfiles.ariadne.space/pkgconf/pkgconf-{version}.tar.xz"
source_dir_template = "pkgconf-{version}"
