name = "tomlplusplus"
version = "3.4.0"
description = "Header-only TOML parser and serializer for C++17"
source = "https://github.com/marzer/tomlplusplus/archive/refs/tags/v3.4.0.tar.gz"
sha256 = "8517f65938a4faae9ccf8ebb36631a38c1cadfb5efa85d9a72e15b9e97d25155"
source_dir = "tomlplusplus-3.4.0"
deps = ["cmake"]
build_steps = [
    "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF",
    "cmake --build build",
    "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/marzer/tomlplusplus/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/marzer/tomlplusplus/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "tomlplusplus-{version}"
