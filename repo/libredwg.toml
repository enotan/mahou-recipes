name = "libredwg"
version = "0.13.3"
description = "Library for reading and writing DWG files"
source = "https://ftp.gnu.org/gnu/libredwg/libredwg-0.13.3.tar.xz"
sha256 = "83f1f6e78a744777a481ff4520e4cef3f8ac4b2c1c25671077ca12fe81e8816e"
source_dir = "libredwg-0.13.3"
deps = ["pcre2"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/libredwg/"
version_pattern = "libredwg-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
