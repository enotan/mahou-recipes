name = "grep"
version = "3.12"
description = "GNU grep text search tool"
source = "https://ftpmirror.gnu.org/grep/grep-3.12.tar.xz"
sha256 = "2649b27c0e90e632eadcd757be06c6e9a4f48d941de51e7c0f83ff76408a07b9"
source_dir = "grep-3.12"
deps = ["pcre2"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/grep/"
version_pattern = "grep-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftpmirror.gnu.org/grep/grep-{version}.tar.xz"
source_dir_template = "grep-{version}"
