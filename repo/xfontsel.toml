name = "xfontsel"
version = "1.1.1"
description = "Point and click X font selection utility"
source = "https://www.x.org/releases/individual/app/xfontsel-1.1.1.tar.xz"
sha256 = "7a4b86658a7701253ed0fe8a66471e54e4cacbba66d7278f1759d3b3a33a02c9"
source_dir = "xfontsel-1.1.1"
deps = ["libX11", "libXaw", "libXmu", "libXt", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xfontsel-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xfontsel-{version}.tar.xz"
source_dir_template = "xfontsel-{version}"
