name = "twm"
version = "1.0.13"
description = "Tab Window Manager for X11"
source = "https://www.x.org/releases/individual/app/twm-1.0.13.tar.xz"
sha256 = "966c4df15757645943a916c1beee4ff4065b44fde00cf01f8477d8c1d0cba2b6"
