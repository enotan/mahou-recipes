name = "hyprwayland-scanner"
version = "0.4.6"
description = "Hyprland C++ Wayland protocol scanner"
source = "https://github.com/hyprwm/hyprwayland-scanner/archive/refs/tags/v0.4.6.tar.gz"
sha256 = "05f55fd1a20d8ca81b5030980fdb7c87147749230145bdb3745af2741d617f5c"
source_dir = "hyprwayland-scanner-0.4.6"
deps = ["cmake", "pkgconf", "pugixml"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/hyprwm/hyprwayland-scanner/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/hyprwm/hyprwayland-scanner/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "hyprwayland-scanner-{version}"
