name = "wireplumber"
version = "0.5.14"
description = "Replacement for pipewire-media-session"
source = "https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/0.5.14/wireplumber-0.5.14.tar.bz2"
sha256 = "2807a9d1e97075ba10f8b7b8156e31175817d620fa7fc84442b5474123eff5db"
source_dir = "wireplumber-0.5.14"
deps = ["glib", "pipewire"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://gitlab.freedesktop.org/api/v4/projects/pipewire%2Fwireplumber/releases/permalink/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([0-9]+\\.[0-9]+\\.[0-9]+)\""
source_template = "https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/{version}/wireplumber-{version}.tar.bz2"
source_dir_template = "wireplumber-{version}"
