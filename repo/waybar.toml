name = "waybar"
version = "0.15.0"
description = "Highly customizable Wayland bar"
source = "https://github.com/Alexays/Waybar/archive/refs/tags/0.15.0.tar.gz"
sha256 = "21c2bbef88c40473c355003582f9331d2f9b8a01efdcce0935edfc5f6b023a3e"
source_dir = "Waybar-0.15.0"
deps = ["date", "eudev", "fmt", "gtk-layer-shell", "gtkmm", "jsoncpp", "libxkbcommon", "spdlog", "wayland", "wayland-protocols"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dman-pages=disabled -Ddbusmenu-gtk=disabled -Dlibinput=disabled -Dlibnl=disabled -Dlibudev=enabled -Dlibevdev=disabled -Dlogind=disabled -Dmpd=disabled -Dmpris=disabled -Dpulseaudio=disabled -Dpipewire=disabled -Dsndio=disabled -Dsystemd=disabled -Dupower_glib=disabled -Drfkill=disabled -Djack=disabled -Dwireplumber=disabled -Dcava=disabled -Dgps=disabled -Dtests=disabled",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://github.com/Alexays/Waybar/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/Alexays/Waybar/archive/refs/tags/{version}.tar.gz"
source_dir_template = "Waybar-{version}"
