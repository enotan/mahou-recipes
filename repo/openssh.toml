name = "openssh"
version = "10.3p1"
description = "OpenSSH remote login and file transfer tools"
source = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz"
sha256 = "56682a36bb92dcf4b4f016fd8ec8e74059b79a8de25c15d670d731e7d18e45f4"
source_dir = "openssh-10.3p1"
deps = ["openssl", "zlib"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc/ssh",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/"
version_pattern = "openssh-([0-9]+\\.[0-9]+p[0-9]+)\\.tar\\.gz"
source_template = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-{version}.tar.gz"
source_dir_template = "openssh-{version}"
