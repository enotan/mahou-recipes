name = "wl-clipboard"
version = "2.3.0"
description = "Wayland clipboard utilities"
source = "https://github.com/bugaevc/wl-clipboard/archive/v2.3.0.tar.gz"
sha256 = "b4dc560973f0cd74e02f817ffa2fd44ba645a4f1ea94b7b9614dacc9f895f402"
source_dir = "wl-clipboard-2.3.0"
deps = ["wayland"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://api.github.com/repos/bugaevc/wl-clipboard/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/bugaevc/wl-clipboard/archive/v{version}.tar.gz"
source_dir_template = "wl-clipboard-{version}"
