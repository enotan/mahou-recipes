sha256 = "4cb280bc47693b07c5e00fd0e5ad5721aabebc0548c3f06774e5cc3cbcf75697"
source_dir = "font-adobe-utopia-type1-1.0.5"
deps = ["font-util", "mkfontscale", "pkgconf"]

build_steps = [
