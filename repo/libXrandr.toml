name = "libXrandr"
version = "1.5.5"
description = "X11 RandR extension library"
source = "https://www.x.org/releases/individual/lib/libXrandr-1.5.5.tar.xz"
sha256 = "72b922c2e765434e9e9f0960148070bd4504b288263e2868a4ccce1b7cf2767a"
source_dir = "libXrandr-1.5.5"
deps = ["libX11", "libXext", "libXrender", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libXrandr-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libXrandr-{version}.tar.xz"
source_dir_template = "libXrandr-{version}"
