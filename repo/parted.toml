name = "parted"
version = "3.7"
description = "Disk partition manipulation program and library"
source = "https://ftp.gnu.org/gnu/parted/parted-3.7.tar.xz"
sha256 = "008de57561a4f3c25a0648e66ed11e7b30be493889b64334a6d70f2c1951ef7b"
source_dir = "parted-3.7"
deps = ["ncurses", "readline", "util-linux"]

build_steps = [
  "./configure --prefix=/usr --disable-device-mapper --disable-nls --with-readline",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/parted/"
version_pattern = "parted-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/parted/parted-{version}.tar.xz"
source_dir_template = "parted-{version}"
