name = "enchant"
version = "2.8.16"
description = "Generic spell checking library"
source = "https://github.com/rrthomas/enchant/releases/download/v2.8.16/enchant-2.8.16.tar.gz"
sha256 = "d73162b5eff401a6397e1215e2b103bcef83f921c396c7f6b1394d2450d124e2"
source_dir = "enchant-2.8.16"
deps = ["glib", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr --mandir=/usr/share/man --with-nuspell=no --with-hspell=no --with-voikko=no --with-applespell=no --with-zemberek=no {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.aspell]
deps = ["aspell"]
build_flags = ["--with-aspell"]
disabled_build_flags = ["--with-aspell=no"]

[features.hunspell]
deps = ["hunspell"]
build_flags = ["--with-hunspell"]
disabled_build_flags = ["--with-hunspell=no"]

[update]
check_url = "https://github.com/rrthomas/enchant/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/rrthomas/enchant/releases/download/v{version}/enchant-{version}.tar.gz"
source_dir_template = "enchant-{version}"
