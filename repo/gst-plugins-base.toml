name = "gst-plugins-base"
version = "1.28.3"
description = "Base plugins and libraries for GStreamer"
source = "https://gstreamer.freedesktop.org/src/gst-plugins-base/gst-plugins-base-1.28.3.tar.xz"
sha256 = "27880f3d87efa3bb5aa5f99f7ef6e4be7c95229f44eee928c1633d32e87d0099"
source_dir = "gst-plugins-base-1.28.3"
deps = ["glib", "gstreamer", "libdrm"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release -Dexamples=disabled -Dtests=disabled -Ddoc=disabled -Dgl=disabled -Dx11=disabled -Dxshm=disabled -Dxvideo=disabled -Dxi=disabled -Dcdparanoia=disabled -Dlibvisual=disabled -Dtheora=disabled -Dtremor=disabled -Dorc=disabled {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.alsa]
deps = ["alsa-lib"]
build_flags = ["-Dalsa=enabled"]
disabled_build_flags = ["-Dalsa=disabled"]

[features.introspection]
deps = ["gobject-introspection"]
build_flags = ["-Dintrospection=enabled"]
disabled_build_flags = ["-Dintrospection=disabled"]

[features.opus]
deps = ["opus"]
build_flags = ["-Dopus=enabled"]
disabled_build_flags = ["-Dopus=disabled"]

[features.pango]
deps = ["pango"]
build_flags = ["-Dpango=enabled"]
disabled_build_flags = ["-Dpango=disabled"]

[features.vorbis]
deps = ["libogg", "libvorbis"]
build_flags = ["-Dogg=enabled", "-Dvorbis=enabled"]
disabled_build_flags = ["-Dogg=disabled", "-Dvorbis=disabled"]

[update]
check_url = "https://gstreamer.freedesktop.org/src/gst-plugins-base/"
version_pattern = "gst-plugins-base-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://gstreamer.freedesktop.org/src/gst-plugins-base/gst-plugins-base-{version}.tar.xz"
source_dir_template = "gst-plugins-base-{version}"
