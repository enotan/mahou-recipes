name = "font-bh-type1"
version = "1.0.4"
description = "Bigelow Holmes Type1 fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-bh-type1-1.0.4.tar.xz"
sha256 = "19dec3ec06abde6bedd10094579e928be0f0fc3bdb4fbe93f4c69cce406d72a6"
source_dir = "font-bh-type1-1.0.4"
deps = ["font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-bh-type1-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-bh-type1-{version}.tar.xz"
source_dir_template = "font-bh-type1-{version}"
