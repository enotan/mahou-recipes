name = "libdmx"
version = "1.1.5"
description = "X11 Distributed Multihead X extension library"
source = "https://www.x.org/releases/individual/lib/libdmx-1.1.5.tar.xz"
sha256 = "35a4e26a8b0b2b4fe36441dca463645c3fa52d282ac3520501a38ea942cbf74f"
source_dir = "libdmx-1.1.5"
deps = ["libX11", "libXext", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/lib/"
version_pattern = "libdmx-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/lib/libdmx-{version}.tar.xz"
source_dir_template = "libdmx-{version}"
