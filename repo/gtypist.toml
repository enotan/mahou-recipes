name = "gtypist"
version = "2.10.1"
description = "Universal typing tutor"
source = "https://ftp.gnu.org/gnu/gtypist/gtypist-2.10.1.tar.xz"
sha256 = "ca618054e91f1ed5ef043fcc43500bbad701c959c31844d4688ff22849ac252d"
source_dir = "gtypist-2.10.1"
deps = ["ncurses"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/gtypist/"
version_pattern = "gtypist-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://ftp.gnu.org/gnu/gtypist/gtypist-{version}.tar.xz"
source_dir_template = "gtypist-{version}"
