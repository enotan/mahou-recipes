name = "mcron"
version = "1.2.3"
description = "GNU cron replacement written in Guile"
source = "https://ftp.gnu.org/gnu/mcron/mcron-1.2.3.tar.gz"
sha256 = "1bc8c0d362d3b1a30fa0071d7fab696bbfc1da1ed536c42e0480bb9ffd22154e"
source_dir = "mcron-1.2.3"
deps = ["guile"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/mcron/"
version_pattern = "mcron-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/mcron/mcron-{version}.tar.gz"
source_dir_template = "mcron-{version}"
