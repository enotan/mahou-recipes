build_steps = [
  "sed -i '/-fforce-mem/d' configure",
  "./configure --prefix=/usr --mandir=/usr/share/man",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://sourceforge.net/projects/mad/files/libmad/"
