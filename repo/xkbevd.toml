name = "xkbevd"
version = "1.1.6"
description = "XKB event daemon"
source = "https://www.x.org/releases/individual/app/xkbevd-1.1.6.tar.xz"
sha256 = "d9b401f84cf8568342ff63b1ffc6aecd3877579256d89fe6408645e2741b073e"
source_dir = "xkbevd-1.1.6"
deps = ["libX11", "libxkbfile", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xkbevd-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xkbevd-{version}.tar.xz"
source_dir_template = "xkbevd-{version}"
