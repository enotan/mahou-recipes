name = "wget"
version = "1.25.0"
description = "Non-interactive network downloader"
source = "https://ftp.gnu.org/gnu/wget/wget-1.25.0.tar.gz"
sha256 = "766e48423e79359ea31e41db9e5c289675947a7fcf2efdcedb726ac9d0da3784"
source_dir = "wget-1.25.0"
deps = []

build_steps = [
  "./configure --prefix=/usr {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.iri]
deps = ["libidn2"]
build_flags = ["--enable-iri"]
disabled_build_flags = ["--disable-iri"]

[features.libpsl]
deps = ["libpsl"]
build_flags = ["--with-libpsl"]
disabled_build_flags = ["--without-libpsl"]

[features.pcre2]
deps = ["pcre2"]
build_flags = ["--enable-pcre2"]
disabled_build_flags = ["--disable-pcre2", "--disable-pcre"]

[features.ssl]
deps = ["openssl"]
build_flags = ["--with-ssl=openssl"]
disabled_build_flags = ["--with-ssl=no"]

[features.zlib]
deps = ["zlib"]
build_flags = ["--with-zlib"]
disabled_build_flags = ["--without-zlib"]

[update]
check_url = "https://ftp.gnu.org/gnu/wget/"
version_pattern = "wget-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/wget/wget-{version}.tar.gz"
source_dir_template = "wget-{version}"
