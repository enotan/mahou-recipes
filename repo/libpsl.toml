name = "libpsl"
version = "0.21.5"
description = "C library for the Public Suffix List"
source = "https://github.com/rockdaboot/libpsl/releases/download/0.21.5/libpsl-0.21.5.tar.gz"
sha256 = "1dcc9ceae8b128f3c0b3f654decd0e1e891afc6ff81098f227ef260449dae208"
source_dir = "libpsl-0.21.5"
deps = ["libidn2", "libunistring"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://api.github.com/repos/rockdaboot/libpsl/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/rockdaboot/libpsl/releases/download/{version}/libpsl-{version}.tar.gz"
source_dir_template = "libpsl-{version}"
