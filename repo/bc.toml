name = "bc"
version = "1.08.2"
description = "Arbitrary precision numeric processing language"
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/bc/"

source = "https://ftp.gnu.org/gnu/bc/bc-1.08.2.tar.gz"
sha256 = "ae470fec429775653e042015edc928d07c8c3b2fc59765172a330d3d87785f86"
source_dir = "bc-1.08.2"

deps = ["readline"]

build_steps = [
  "./configure --prefix=/usr --with-readline",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://ftp.gnu.org/gnu/bc/"
version_pattern = "bc-([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\\.tar\\.gz"
source_template = "https://ftp.gnu.org/gnu/bc/bc-{version}.tar.gz"
source_dir_template = "bc-{version}"
