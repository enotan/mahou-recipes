name = "thunderbird-bin"
version = "151.0.1"
description = "Thunderbird email client binary build"
source = "https://ftp.mozilla.org/pub/thunderbird/releases/151.0.1/linux-x86_64/en-US/thunderbird-151.0.1.tar.xz"
sha256 = "350c77286ad11cd2679d22b0cf9d15e84b665cef70c1b436d177cfa43846c6a8"
source_dir = "thunderbird"
deps = ["dbus", "gtk+", "libX11", "libxcb", "pango"]

build_steps = [
  "mkdir -p ${MAHOU_DESTDIR}/opt/thunderbird-bin ${MAHOU_DESTDIR}/usr/bin",
  "cp -a . ${MAHOU_DESTDIR}/opt/thunderbird-bin/",
  "ln -sf /opt/thunderbird-bin/thunderbird ${MAHOU_DESTDIR}/usr/bin/thunderbird-bin",
]

[update]
check_url = "https://product-details.mozilla.org/1.0/thunderbird_versions.json"
version_pattern = "\"LATEST_THUNDERBIRD_VERSION\": \"([0-9]+\\.[0-9]+(?:\\.[0-9]+)?)\""
source_template = "https://ftp.mozilla.org/pub/thunderbird/releases/{version}/linux-x86_64/en-US/thunderbird-{version}.tar.xz"
source_dir_template = "thunderbird"
