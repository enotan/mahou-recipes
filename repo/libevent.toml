name = "libevent"
version = "2.1.12-stable"
description = "Library to execute a function when a specific event occurs on a file descriptor"
source = "https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz"
sha256 = "92e6de1be9ec176428fd2367677e61ceffc2ee1cb119035037a27d346b0403bb"
source_dir = "libevent-2.1.12-stable"
deps = []

build_steps = [
  "./configure --prefix=/usr --disable-samples {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.openssl]
deps = ["openssl"]
build_flags = []
disabled_build_flags = ["--disable-openssl"]

[update]
check_url = "https://github.com/libevent/libevent/releases"
version_pattern = "/releases/tag/release-([0-9]+\\.[0-9]+\\.[0-9]+-stable)"
source_template = "https://github.com/libevent/libevent/releases/download/release-{version}/libevent-{version}.tar.gz"
source_dir_template = "libevent-{version}"
