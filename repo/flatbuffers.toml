name = "flatbuffers"
version = "25.12.19"
description = "Memory-efficient serialization library"
source = "https://github.com/google/flatbuffers/archive/refs/tags/v25.12.19.tar.gz"
sha256 = "f81c3162b1046fe8b84b9a0dbdd383e24fdbcf88583b9cb6028f90d04d90696a"
source_dir = "flatbuffers-25.12.19"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DFLATBUFFERS_BUILD_TESTS=OFF -DFLATBUFFERS_BUILD_FLATLIB=OFF -DFLATBUFFERS_BUILD_FLATC=ON -DFLATBUFFERS_BUILD_SHAREDLIB=ON -DFLATBUFFERS_BUILD_FLATHASH=OFF -DFLATBUFFERS_BUILD_BENCHMARKS=OFF -DFLATBUFFERS_BUILD_GRPCTEST=OFF -DFLATBUFFERS_INSTALL=ON",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/google/flatbuffers/tags"
version_pattern = "\"name\"\\s*:\\s*\"v?([0-9]+\\.[0-9]+\\.[0-9]+)\""
source_template = "https://github.com/google/flatbuffers/archive/refs/tags/v{version}.tar.gz"
source_dir_template = "flatbuffers-{version}"
