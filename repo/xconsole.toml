name = "xconsole"
version = "1.1.0"
description = "Monitor system console messages in X"
source = "https://www.x.org/releases/individual/app/xconsole-1.1.0.tar.xz"
sha256 = "0c775978cacdda76dfc8b5a97142f145a177d26220dd307866d9dd62e7391189"
source_dir = "xconsole-1.1.0"
deps = ["libX11", "libXaw", "libXmu", "libXt", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xconsole-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xconsole-{version}.tar.xz"
source_dir_template = "xconsole-{version}"
