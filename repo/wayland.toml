name = "wayland"
version = "1.25.0"
description = "Wayland protocol libraries"
source = "https://gitlab.freedesktop.org/wayland/wayland/-/releases/1.25.0/downloads/wayland-1.25.0.tar.xz"
sha256 = "c065f040afdff3177680600f249727e41a1afc22fccf27222f15f5306faa1f03"
source_dir = "wayland-1.25.0"
deps = ["libffi", "expat"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://gitlab.freedesktop.org/wayland/wayland/-/tags"
version_pattern = "/-/tags/([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://gitlab.freedesktop.org/wayland/wayland/-/releases/{version}/downloads/wayland-{version}.tar.xz"
source_dir_template = "wayland-{version}"
