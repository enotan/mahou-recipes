name = "cairomm"
version = "1.18.0"
description = "C++ bindings for the Cairo vector graphics library"
source = "https://www.cairographics.org/releases/cairomm-1.18.0.tar.xz"
sha256 = "b81255394e3ea8e8aa887276d22afa8985fc8daef60692eb2407d23049f03cfb"
source_dir = "cairomm-1.18.0"
deps = ["cairo", "libsigc++"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://www.cairographics.org/releases/"
version_pattern = "cairomm-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.cairographics.org/releases/cairomm-{version}.tar.xz"
source_dir_template = "cairomm-{version}"
