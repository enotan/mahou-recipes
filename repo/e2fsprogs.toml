name = "e2fsprogs"
version = "1.47.4"
description = "Utilities for the ext2, ext3, and ext4 filesystems"
source = "https://mirrors.edge.kernel.org/pub/linux/kernel/people/tytso/e2fsprogs/v1.47.4/e2fsprogs-1.47.4.tar.xz"
sha256 = "fd5bf388cbdbe006a3d3b318d983b2948382440acc85a87f1e7d108653e8db0b"
source_dir = "e2fsprogs-1.47.4"
deps = []

build_steps = [
  "./configure --prefix=/usr --enable-elf-shlibs --enable-libuuid --enable-libblkid --disable-nls --disable-uuidd --disable-tdb {feature_flags}",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[features.fuse]
deps = ["fuse3"]
build_flags = ["--enable-fuse2fs"]
disabled_build_flags = ["--disable-fuse2fs"]

[features.libarchive]
deps = ["libarchive"]
build_flags = ["--with-libarchive"]
disabled_build_flags = ["--without-libarchive"]

[update]
check_url = "https://mirrors.edge.kernel.org/pub/linux/kernel/people/tytso/e2fsprogs/"
version_pattern = "v([0-9]+\\.[0-9]+\\.[0-9]+)/"
source_template = "https://mirrors.edge.kernel.org/pub/linux/kernel/people/tytso/e2fsprogs/v{version}/e2fsprogs-{version}.tar.xz"
source_dir_template = "e2fsprogs-{version}"
