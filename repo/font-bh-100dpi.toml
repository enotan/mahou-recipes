name = "font-bh-100dpi"
version = "1.0.4"
description = "Bigelow Holmes 100 DPI bitmap fonts for X.Org"
source = "https://www.x.org/releases/individual/font/font-bh-100dpi-1.0.4.tar.xz"
sha256 = "fd8f5efe8491faabdd2744808d3d4eafdae5c83e617017c7fddd2716d049ab1e"
source_dir = "font-bh-100dpi-1.0.4"
deps = ["bdftopcf", "font-util", "mkfontscale", "pkgconf"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/font/"
version_pattern = "font-bh-100dpi-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/font/font-bh-100dpi-{version}.tar.xz"
source_dir_template = "font-bh-100dpi-{version}"
