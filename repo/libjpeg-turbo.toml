name = "libjpeg-turbo"
version = "3.1.4.1"
description = "MMX, SSE, and SSE2 SIMD accelerated JPEG library"
source = "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.1.4.1/libjpeg-turbo-3.1.4.1.tar.gz"
sha256 = "ecae8008e2cc9ade2f2c1bb9d5e6d4fb73e7c433866a056bd82980741571a022"
source_dir = "libjpeg-turbo-3.1.4.1"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/libjpeg-turbo/libjpeg-turbo/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/{version}/libjpeg-turbo-{version}.tar.gz"
source_dir_template = "libjpeg-turbo-{version}"
