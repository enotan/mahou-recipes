name = "nftables"
version = "1.1.6"
description = "Userspace utility for Linux packet filtering"
source = "https://www.netfilter.org/pub/nftables/nftables-1.1.6.tar.xz"
sha256 = "372931bda8556b310636a2f9020adc710f9bab66f47efe0ce90bff800ac2530c"
source_dir = "nftables-1.1.6"
deps = ["libmnl", "libnftnl", "gmp", "readline", "jansson"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --with-json --disable-man-doc",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.netfilter.org/projects/nftables/downloads.html"
version_pattern = "nftables-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.netfilter.org/pub/nftables/nftables-{version}.tar.xz"
source_dir_template = "nftables-{version}"
