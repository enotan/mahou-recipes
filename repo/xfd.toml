name = "xfd"
version = "1.1.5"
description = "Display all characters in an X font"
source = "https://www.x.org/releases/individual/app/xfd-1.1.5.tar.xz"
sha256 = "9048aafba291e3baaab2e76fc298195ec58d82827649b9ee60af6838a1059475"
source_dir = "xfd-1.1.5"
deps = ["libX11", "libXaw", "libXft", "libXt", "xorg-proto"]

build_steps = [
  "./configure --prefix=/usr",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://www.x.org/releases/individual/app/"
version_pattern = "xfd-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.x.org/releases/individual/app/xfd-{version}.tar.xz"
source_dir_template = "xfd-{version}"
