name = "libsigc++"
version = "2.12.1"
description = "Typesafe callback system for standard C++"
source = "https://download.gnome.org/sources/libsigc++/2.12/libsigc++-2.12.1.tar.xz"
sha256 = "a9dbee323351d109b7aee074a9cb89ca3e7bcf8ad8edef1851f4cf359bd50843"
source_dir = "libsigc++-2.12.1"
deps = ["mm-common"]

build_steps = [
  "meson setup build --prefix=/usr --libdir=lib --buildtype=release --wrap-mode=nofallback -Dmaintainer-mode=false -Dbuild-documentation=false {feature_flags}",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[features.tests]
enabled = false
build_flags = ["-Dbuild-tests=true"]
disabled_build_flags = ["-Dbuild-tests=false"]

[update]
check_url = "https://download.gnome.org/sources/libsigc++/2.12/"
version_pattern = "libsigc\\+\\+-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.gnome.org/sources/libsigc++/2.12/libsigc++-{version}.tar.xz"
source_dir_template = "libsigc++-{version}"
