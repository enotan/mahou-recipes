name = "libsigc++"
version = "3.8.0"
description = "Typesafe callback system for standard C++"
source = "https://github.com/libsigcplusplus/libsigcplusplus/releases/download/3.8.0/libsigc++-3.8.0.tar.xz"
sha256 = "502a743bb07ed7627dd41bd85ec4b93b4954f06b531adc45818d24a959f54e36"
source_dir = "libsigc++-3.8.0"
deps = []

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://api.github.com/repos/libsigcplusplus/libsigcplusplus/releases/latest"
version_pattern = "\"tag_name\"\\s*:\\s*\"v?([^\"]+)\""
source_template = "https://github.com/libsigcplusplus/libsigcplusplus/releases/download/{version}/libsigc++-{version}.tar.xz"
source_dir_template = "libsigc++-{version}"
