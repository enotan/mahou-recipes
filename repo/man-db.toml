name = "man-db"
version = "2.13.1"
description = "Manual page reader and indexing tools"
source = "https://download.savannah.nongnu.org/releases/man-db/man-db-2.13.1.tar.xz"
sha256 = "8afebb6f7eb6bb8542929458841f5c7e6f240e30c86358c1fbcefbea076c87d9"
source_dir = "man-db-2.13.1"
deps = ["gdbm", "gettext", "groff", "less", "libiconv", "libpipeline", "zlib"]

build_steps = [
  "./configure --prefix=/usr --sysconfdir=/etc --disable-setuid --disable-manual --with-db=gdbm --without-libseccomp",
  "make",
  "make DESTDIR=${MAHOU_DESTDIR} install",
]

[update]
check_url = "https://download.savannah.nongnu.org/releases/man-db/"
version_pattern = "man-db-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://download.savannah.nongnu.org/releases/man-db/man-db-{version}.tar.xz"
source_dir_template = "man-db-{version}"
