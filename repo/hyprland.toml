name = "hyprland"
version = "0.55.4"
description = "Dynamic tiling Wayland compositor"
source = "https://github.com/hyprwm/Hyprland/releases/download/v0.55.4/source-v0.55.4.tar.gz"
sha256 = "10cdda47e6a42e603a646ffda89c9fca0628c3a8211e2fbbee02f6282effe30b"
source_dir = "hyprland-source"
deps = ["aquamarine", "cairo", "cmake", "glslang", "hyprcursor", "hyprgraphics", "hyprland-protocols", "hyprlang", "hyprutils", "hyprwayland-scanner", "libXcursor", "libdrm", "libinput", "libxkbcommon", "mesa", "pango", "pixman", "pkgconf", "re2", "wayland", "wayland-protocols", "xcb-util-errors", "xcb-util-wm"]

build_steps = [
  "STAGE_ROOT=$(dirname \"${MAHOU_DESTDIR}\"); CMAKE_PREFIX_PATH=\"${CMAKE_PREFIX_PATH:-/usr}\"; PKG_CONFIG_PATH=\"${PKG_CONFIG_PATH:-/usr/lib/pkgconfig:/usr/lib64/pkgconfig:/usr/share/pkgconfig}\"; LIBRARY_PATH=\"${LIBRARY_PATH:-/usr/lib:/usr/lib64}\"; LD_LIBRARY_PATH=\"${LD_LIBRARY_PATH:-/usr/lib:/usr/lib64}\"; for prefix in \"${STAGE_ROOT}\"/*/usr; do [ -d \"${prefix}\" ] || continue; CMAKE_PREFIX_PATH=\"${prefix}:${CMAKE_PREFIX_PATH}\"; PKG_CONFIG_PATH=\"${prefix}/lib/pkgconfig:${prefix}/lib64/pkgconfig:${prefix}/share/pkgconfig:${PKG_CONFIG_PATH}\"; LIBRARY_PATH=\"${prefix}/lib:${prefix}/lib64:${LIBRARY_PATH}\"; LD_LIBRARY_PATH=\"${prefix}/lib:${prefix}/lib64:${LD_LIBRARY_PATH}\"; PATH=\"${prefix}/bin:${prefix}/sbin:${PATH:-}\"; done; export CMAKE_PREFIX_PATH PKG_CONFIG_PATH LIBRARY_PATH LD_LIBRARY_PATH PATH; cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DNO_HYPRPM=ON -DBUILD_TESTING=OFF",
  "cmake --build build",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/hyprwm/Hyprland/releases"
version_pattern = "/releases/tag/v?([0-9]+\\.[0-9]+\\.[0-9]+)"
source_template = "https://github.com/hyprwm/Hyprland/releases/download/v{version}/source-v{version}.tar.gz"
source_dir_template = "hyprland-source"
