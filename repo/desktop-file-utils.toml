name = "desktop-file-utils"
version = "0.28"
description = "Utilities for working with desktop entries"
source = "https://www.freedesktop.org/software/desktop-file-utils/releases/desktop-file-utils-0.28.tar.xz"
sha256 = "4401d4e231d842c2de8242395a74a395ca468cd96f5f610d822df33594898a70"
source_dir = "desktop-file-utils-0.28"
deps = ["glib"]

build_steps = [
  "meson setup build --prefix=/usr --buildtype=release",
  "ninja -C build",
  "DESTDIR=${MAHOU_DESTDIR} ninja -C build install",
]

[update]
check_url = "https://www.freedesktop.org/software/desktop-file-utils/releases/"
version_pattern = "desktop-file-utils-([0-9]+\\.[0-9]+)\\.tar\\.xz"
source_template = "https://www.freedesktop.org/software/desktop-file-utils/releases/desktop-file-utils-{version}.tar.xz"
source_dir_template = "desktop-file-utils-{version}"
