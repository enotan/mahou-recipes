name = "graphite2"
version = "1.3.14"
description = "Smart font rendering engine"
source = "https://github.com/silnrsi/graphite/releases/download/1.3.14/graphite2-1.3.14.tgz"
sha256 = "f99d1c13aa5fa296898a181dff9b82fb25f6cc0933dbaa7a475d8109bd54209d"
source_dir = "graphite2-1.3.14"
deps = ["cmake"]

build_steps = [
  "cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_MANDIR=/usr/share/man -DCMAKE_BUILD_TYPE=Release",
  "cmake --build build --target graphite2",
  "DESTDIR=${MAHOU_DESTDIR} cmake --install build",
]

[update]
check_url = "https://github.com/silnrsi/graphite/releases"
version_pattern = "/releases/tag/([^\"/]+)"
source_template = "https://github.com/silnrsi/graphite/releases/download/{version}/graphite2-{version}.tgz"
source_dir_template = "graphite2-{version}"
